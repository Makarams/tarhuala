<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="ember">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Novel — Tarhuala | Dark Fantasy &amp; Horror Web Fiction</title>
  <meta name="description" content="Read dark fantasy, horror and apocalyptic web novels by Tarhuala. Free online fiction — updated daily." />
  <meta name="keywords" content="Tarhuala, dark fantasy, horror novel, web novel, read online free, apocalyptic fiction, supernatural" />
  <meta name="author" content="Tarhuala" />
  <meta name="robots" content="index, follow" />
  <meta property="og:site_name" content="Tarhuala" />
  <meta property="og:type" content="book" />
  <meta property="og:image" content="https://tarhuala.com/images/og-cover.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tarhuala.com/images/og-cover.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />

  <script>
    (function(){
      try{
        var s=localStorage.getItem('tarhuala-theme');
        var pd=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
        document.documentElement.setAttribute('data-theme',s||(pd?'dark':'light'));
      }catch(e){}
    })();
  </script>
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
    <a href="index.html" class="nav-brand">
      <span class="nav-emblem"><svg><use href="#kb-rose"></use></svg></span>
      <span data-site-name>TARHUALA</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="novels.html" class="nav-link active" aria-current="page">Novels</a>
      <a href="about.html" class="nav-link">About</a>
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
        <span data-theme-icon></span>
      </button>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    <section class="novel-hero" id="novel-hero">
      <div class="novel-hero-bg" aria-hidden="true">
        <img id="novel-hero-bg-img" src="" alt="" class="novel-hero-bg-img" loading="lazy" decoding="async" />
        <div class="novel-hero-bg-overlay"></div>
      </div>

      <div class="novel-hero-rose" aria-hidden="true"><svg><use href="#kb-rose-8"></use></svg></div>

      <div class="novel-hero-inner">
        <div class="novel-cover-wrap">
          <div class="novel-cover-frame">
            <span class="kb-corner tl"><svg><use href="#kb-corner"></use></svg></span>
            <span class="kb-corner tr"><svg><use href="#kb-corner"></use></svg></span>
            <span class="kb-corner bl"><svg><use href="#kb-corner"></use></svg></span>
            <span class="kb-corner br"><svg><use href="#kb-corner"></use></svg></span>

            <img
              id="novel-cover"
              src=""
              alt="Novel cover"
              class="novel-detail-cover"
              loading="eager"
              decoding="async"
            />
          </div>
        </div>

        <div class="novel-hero-text">
          <div class="eyebrow" id="novel-genre">Genre</div>
          <h1 class="novel-title" id="novel-title">Loading…</h1>

          <div class="novel-hero-meta" aria-label="Novel metadata">
            <span id="novel-status"></span>
            <span class="meta-dot" aria-hidden="true">·</span>
            <span><strong id="novel-chcount">—</strong> Chapters</span>
            <span class="meta-dot" aria-hidden="true">·</span>
            <span id="novel-rating"></span>
          </div>

          <div class="novel-hero-desc" id="novel-desc"></div>

          <div class="novel-hero-tags" id="novel-tags" aria-label="Novel tags"></div>
          <div class="novel-platforms" id="novel-platforms" hidden aria-label="Reading platforms"></div>

          <div class="novel-hero-cta">
            <a id="novel-read-btn" href="#" class="btn btn-primary">
              Start Reading
              <span class="kb-rose"><svg><use href="#kb-rose"></use></svg></span>
            </a>
            <a href="#novel-chapters" class="btn btn-ghost">All Chapters</a>
          </div>
        </div>
      </div>
    </section>

    <section class="novel-chapters-section" id="novel-chapters">
      <div class="novel-chapters-inner">
        <div class="chapters-toolbar">
          <div class="chapters-count">
            <span id="visible-count">—</span> chapters
          </div>
          <div class="chapters-sort" role="group" aria-label="Sort chapters">
            <button class="sort-btn active" data-order="asc" aria-pressed="true">Oldest First</button>
            <button class="sort-btn" data-order="desc" aria-pressed="false">Newest First</button>
          </div>
        </div>
        <ol class="chapters-full-list" id="chapters-full-list" aria-label="Chapter list"></ol>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="kb-rose"><svg><use href="#kb-rose"></use></svg></span>
        <span data-site-name>TARHUALA</span> · Dark Fiction
      </div>
      <div class="footer-links">
        <a href="index.html" class="footer-link">Home</a>
        <a href="novels.html" class="footer-link">Novels</a>
        <a href="about.html" class="footer-link">About</a>
      </div>
      <div class="footer-meta">
        <span class="footer-cw">18+ Mature Content</span><br />
        &copy; <span id="copy-year"></span>
        <a href="/analytics.html" id="footer-copy" class="footer-analytics-link" tabindex="-1" aria-hidden="true">Tarhuala</a>
      </div>
    </div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg><use href="#ic-arrow-up"></use></svg>
  </button>

  <script src="/js/app.js"></script>
</body>
</html>
