<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="4" seed="17"/>
    <feColorMatrix values="0 0 0 0 0.02  0 0 0 0 0.02  0 0 0 0 0.06  0 0 0 0.52 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="portalglow" x="-65%" y="-65%" width="230%" height="230%">
    <feGaussianBlur stdDeviation="30" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="voidcore" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="48" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="bg" cx="50%" cy="34%" r="72%">
    <stop offset="0%" stop-color="#060818"/>
    <stop offset="46%" stop-color="#030512"/>
    <stop offset="100%" stop-color="#010108"/>
  </radialGradient>
  <radialGradient id="indigoAura" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#6070d8" stop-opacity="0.48"/>
    <stop offset="46%" stop-color="#2a3890" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="voidInner" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#d8e0ff" stop-opacity="0.95"/>
    <stop offset="18%"  stop-color="#8090ec" stop-opacity="0.78"/>
    <stop offset="52%"  stop-color="#2a3890" stop-opacity="0.40"/>
    <stop offset="100%" stop-color="#000012" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="groundFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="vig" cx="50%" cy="40%" r="76%">
    <stop offset="40%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.95"/>
  </radialGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="244" rx="236" ry="220" fill="url(#indigoAura)"/>

<!-- data lattice grid — crisp, not just lines -->
<g stroke="#1e2c9a" stroke-width="0.50" fill="none" opacity="0.22">
  <line x1="50"  y1="0" x2="50"  y2="600"/><line x1="100" y1="0" x2="100" y2="600"/>
  <line x1="150" y1="0" x2="150" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
  <line x1="250" y1="0" x2="250" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
  <line x1="350" y1="0" x2="350" y2="600"/>
  <line x1="0" y1="50"  x2="400" y2="50"/> <line x1="0" y1="100" x2="400" y2="100"/>
  <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
  <line x1="0" y1="250" x2="400" y2="250"/><line x1="0" y1="300" x2="400" y2="300"/>
  <line x1="0" y1="350" x2="400" y2="350"/><line x1="0" y1="400" x2="400" y2="400"/>
</g>
<!-- grid intersection dots -->
<g fill="#3040b0" opacity="0.30">
  <circle cx="50"  cy="100" r="1.3"/><circle cx="100" cy="100" r="1.3"/><circle cx="150" cy="100" r="1.3"/>
  <circle cx="200" cy="100" r="1.6"/><circle cx="250" cy="100" r="1.3"/><circle cx="300" cy="100" r="1.3"/>
  <circle cx="350" cy="100" r="1.3"/><circle cx="50"  cy="200" r="1.3"/><circle cx="350" cy="200" r="1.3"/>
  <circle cx="50"  cy="300" r="1.3"/><circle cx="350" cy="300" r="1.3"/><circle cx="50"  cy="400" r="1.3"/>
  <circle cx="350" cy="400" r="1.3"/>
</g>

<!-- glitch scan lines — varied opacity for corruption feel -->
<g fill="#5060c0">
  <rect x="0" y="82"  width="400" height="2.5" opacity="0.08"/>
  <rect x="0" y="145" width="260" height="2.0" opacity="0.06"/>
  <rect x="80" y="196" width="320" height="3.5" opacity="0.09"/>
  <rect x="0" y="274" width="400" height="2.0" opacity="0.07"/>
  <rect x="0" y="336" width="180" height="2.5" opacity="0.07"/>
  <rect x="140" y="366" width="260" height="1.5" opacity="0.06"/>
</g>

<!-- fracture veins radiating from gate -->
<g stroke="#6878e8" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.55">
  <path d="M 200 232 Q 146 186 104 144 Q 78 118 48 90"/>
  <path d="M 200 232 Q 254 184 298 144 Q 324 118 354 92"/>
  <path d="M 200 232 Q 166 270 140 322 Q 118 366 94 420"/>
  <path d="M 200 232 Q 236 268 260 320 Q 282 366 304 422"/>
  <path d="M 200 232 Q 150 228 108 222 Q 70 216 28 206"/>
  <path d="M 200 232 Q 252 226 296 220 Q 334 214 372 206"/>
</g>
<!-- secondary fractures -->
<g stroke="#4858c8" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.36">
  <path d="M 104 144 Q 84 124 72 100"/><path d="M 298 144 Q 318 122 330 98"/>
  <path d="M 140 322 Q 124 354 118 390"/><path d="M 260 320 Q 278 352 282 388"/>
  <path d="M 48 90 Q 38 76 28 58"/><path d="M 354 92 Q 362 76 368 58"/>
</g>
<!-- fracture node glows -->
<g fill="#8090ec" filter="url(#glow)" opacity="0.78">
  <circle cx="104" cy="144" r="3.5"/><circle cx="298" cy="144" r="3.5"/>
  <circle cx="140" cy="322" r="3.0"/><circle cx="260" cy="320" r="3.0"/>
  <circle cx="108" cy="222" r="2.4"/><circle cx="296" cy="220" r="2.4"/>
</g>

<!-- ── HEXAGONAL VOID GATE ── -->
<!-- deep core energy blob -->
<g transform="translate(200 232)" filter="url(#voidcore)">
  <circle r="58" fill="#4858d0" opacity="0.48"/>
</g>
<!-- outer glow rings -->
<g transform="translate(200 232)" filter="url(#portalglow)">
  <circle r="80"  fill="none" stroke="#6878ec" stroke-width="3.0" opacity="0.42"/>
  <circle r="100" fill="none" stroke="#4858c8" stroke-width="1.8" opacity="0.26"/>
</g>

<g transform="translate(200 232)" filter="url(#glow)">
  <!-- outer circuit ring with data pads -->
  <circle r="120" fill="none" stroke="#4050c8" stroke-width="0.9" opacity="0.32"/>
  <circle r="106" fill="none" stroke="#5868d8" stroke-width="1.4" opacity="0.42"/>

  <!-- 6 circuit arms to hex corners -->
  <g stroke="#4858c0" stroke-width="1.2" fill="none" opacity="0.55">
    <line x1="0"    y1="-122" x2="0"    y2="-94"/>
    <line x1="0"    y1=" 122" x2="0"    y2=" 94"/>
    <g transform="rotate(60)">
      <line x1="0"  y1="-120" x2="0"    y2="-92"/>
      <line x1="0"  y1=" 120" x2="0"    y2=" 92"/>
    </g>
    <g transform="rotate(120)">
      <line x1="0"  y1="-118" x2="0"    y2="-90"/>
      <line x1="0"  y1=" 118" x2="0"    y2=" 90"/>
    </g>
  </g>
  <!-- arm terminal pads -->
  <g fill="#8090ec" opacity="0.74">
    <rect x="-7" y="-128" width="14" height="8" rx="1.5"/>
    <rect x="-7" y=" 120" width="14" height="8" rx="1.5"/>
    <g transform="rotate(60)"><rect x="-7" y="-126" width="14" height="8" rx="1.5"/><rect x="-7" y="118" width="14" height="8" rx="1.5"/></g>
    <g transform="rotate(120)"><rect x="-7" y="-124" width="14" height="8" rx="1.5"/><rect x="-7" y="116" width="14" height="8" rx="1.5"/></g>
  </g>

  <!-- hex gate body — intact five sides, one shattered -->
  <!-- base fill -->
  <path d="M 0,-85 L 74,-42 L 74,42 L 0,85 L -74,42 L -74,-42 Z"
    fill="#060a22" fill-opacity="0.92" stroke="#8090ec" stroke-width="2.2"/>
  <!-- inner hex -->
  <path d="M 0,-72 L 62,-36 L 62,36 L 0,72 L -62,36 L -62,-36 Z"
    fill="none" stroke="#9098f4" stroke-width="1.0" opacity="0.58"/>
  <!-- second inner hex -->
  <path d="M 0,-56 L 48,-28 L 48,28 L 0,56 L -48,28 L -48,-28 Z"
    fill="none" stroke="#6878e8" stroke-width="0.75" opacity="0.44"/>

  <!-- SHATTER — upper-right segment missing, replaced by broken shards -->
  <!-- erase upper-right line segment (draw bg over it) -->
  <path d="M 0,-85 L 38,-70" stroke="#060a22" stroke-width="10" fill="none"/>
  <path d="M 74,-42 L 50,-66" stroke="#060a22" stroke-width="10" fill="none"/>
  <!-- flying shard fragments -->
  <polygon points="6,-87 42,-64 32,-72 8,-80" fill="#8090ec" opacity="0.70"/>
  <polygon points="78,-38 54,-68 66,-54 80,-44" fill="#9098f4" opacity="0.62"/>
  <polygon points="18,-82 50,-58 40,-66"  fill="#6878e8" opacity="0.55"/>
  <polygon points="64,-62 82,-40 72,-50"  fill="#7080e0" opacity="0.52"/>
  <!-- shard light edges -->
  <line x1="8"  y1="-80" x2="42" y2="-64" stroke="#d0d8ff" stroke-width="1.4" fill="none" opacity="0.78"/>
  <line x1="66" y1="-54" x2="82" y2="-40" stroke="#d0d8ff" stroke-width="1.0" fill="none" opacity="0.65"/>
  <!-- shard glow nodes -->
  <circle cx="42" cy="-64" r="3.0" fill="#c8d4ff" opacity="0.82" filter="url(#glow)"/>
  <circle cx="78" cy="-40" r="2.5" fill="#c8d4ff" opacity="0.72" filter="url(#glow)"/>

  <!-- void core glow -->
  <circle r="46" fill="url(#voidInner)" opacity="0.78"/>

  <!-- concentric inner precision rings -->
  <circle r="40" fill="none" stroke="#9098f4" stroke-width="1.2" opacity="0.52"/>
  <circle r="30" fill="none" stroke="#7888e8" stroke-width="0.9" opacity="0.44"/>
  <circle r="18" fill="none" stroke="#c0c8ff" stroke-width="0.8" opacity="0.55"/>

  <!-- void eye — null core -->
  <circle r="11" fill="#010110" stroke="#c8d0ff" stroke-width="1.6"/>
  <circle r="6"  fill="#08082e" opacity="0.94"/>
  <circle r="3"  fill="#d8e0ff" opacity="0.82"/>
  <circle r="1.3" fill="#ffffff" opacity="0.92"/>
</g>

<!-- floating data motes -->
<g fill="#7080e8">
  <circle cx="46"  cy="154" r="1.3" opacity="0.57"/><circle cx="90"  cy="122" r="1.0" opacity="0.48"/>
  <circle cx="150" cy="102" r="1.2" opacity="0.54"/><circle cx="258" cy="100" r="1.1" opacity="0.50"/>
  <circle cx="318" cy="120" r="1.3" opacity="0.57"/><circle cx="362" cy="152" r="0.9" opacity="0.46"/>
  <circle cx="64"  cy="316" r="1.1" opacity="0.38"/><circle cx="342" cy="310" r="0.9" opacity="0.36"/>
  <circle cx="24"  cy="246" r="0.8" opacity="0.32"/><circle cx="378" cy="242" r="0.8" opacity="0.32"/>
  <circle cx="182" cy="66"  r="0.9" opacity="0.42"/><circle cx="224" cy="60"  r="0.8" opacity="0.40"/>
</g>

<!-- kbach above gate -->
<g transform="translate(200 106)" fill="none" stroke="#5868c8" stroke-width="0.90" opacity="0.40">
  <path d="M -90,0 Q -67,-24 -45,0 Q -22,24 0,0 Q 22,-24 45,0 Q 67,24 90,0"/>
  <path d="M -67,-18 Q -45,-36 -22,-18 Q 0,0 22,-18 Q 45,-36 67,-18" opacity="0.56"/>
</g>
<g transform="translate(200 106)" fill="#5868c8" opacity="0.55">
  <circle cx="0"   cy="0" r="4.0"/>
  <circle cx="-45" cy="0" r="2.2"/><circle cx="45"  cy="0" r="2.2"/>
  <circle cx="-90" cy="0" r="1.6"/><circle cx="90"  cy="0" r="1.6"/>
</g>

<!-- corridor / instance hallway at base -->
<g fill="#010108" opacity="0.98">
  <rect x="0" y="492" width="400" height="108"/>
  <polygon points="0,492 200,448 400,492"/>
</g>
<!-- perspective corridor lines -->
<g stroke="#1e2c9a" stroke-width="0.8" fill="none" opacity="0.32">
  <line x1="0"   y1="492" x2="200" y2="448"/>
  <line x1="400" y1="492" x2="200" y2="448"/>
  <line x1="0"   y1="516" x2="200" y2="464"/>
  <line x1="400" y1="516" x2="200" y2="464"/>
  <line x1="0"   y1="542" x2="200" y2="484"/>
  <line x1="400" y1="542" x2="200" y2="484"/>
  <!-- ceiling mirrored -->
  <line x1="60"  y1="492" x2="200" y2="448"/>
  <line x1="340" y1="492" x2="200" y2="448"/>
</g>
<!-- corridor wall panels -->
<g stroke="#2030a0" stroke-width="0.5" fill="none" opacity="0.22">
  <rect x="14"  y="496" width="82" height="28" rx="1"/>
  <rect x="14"  y="534" width="82" height="28" rx="1"/>
  <rect x="304" y="496" width="82" height="28" rx="1"/>
  <rect x="304" y="534" width="82" height="28" rx="1"/>
</g>
<!-- far instance door glow -->
<ellipse cx="200" cy="450" rx="12" ry="18" fill="#5868c8" opacity="0.38" filter="url(#glow)"/>
<ellipse cx="200" cy="450" rx="5"  ry="8"  fill="#d0d8ff" opacity="0.68" filter="url(#glow)"/>

<rect x="0" y="446" width="400" height="154" fill="url(#groundFade)"/>
<rect width="400" height="600" fill="url(#vig)"/>
<rect width="400" height="600" filter="url(#grain)" opacity="0.52"/>

<!-- CORNER FRAMES -->
<g stroke="#5868c8" stroke-width="1.9" fill="none" stroke-linecap="round">
  <path d="M 14 46 L 14 14 L 46 14"/><path d="M 354 14 L 386 14 L 386 46"/>
  <path d="M 14 554 L 14 586 L 46 586"/><path d="M 386 554 L 386 586 L 354 586"/>
</g>
<g fill="#5868c8" opacity="0.92">
  <circle cx="14" cy="14" r="3.2"/><circle cx="386" cy="14" r="3.2"/>
  <circle cx="14" cy="586" r="3.2"/><circle cx="386" cy="586" r="3.2"/>
</g>
<g fill="#5868c8" opacity="0.48" stroke="#5868c8" stroke-width="0.5">
  <path d="M 22 22 Q 34 22 34 34 Q 22 34 22 22 Z"/><path d="M 378 22 Q 366 22 366 34 Q 378 34 378 22 Z"/>
  <path d="M 22 578 Q 34 578 34 566 Q 22 566 22 578 Z"/><path d="M 378 578 Q 366 578 366 566 Q 378 566 378 578 Z"/>
</g>
<rect x="10" y="10" width="380" height="580" fill="none" stroke="#5868c8" stroke-width="0.6" opacity="0.32"/>

<!-- TITLE -->
<rect x="0" y="456" width="400" height="144" fill="#010108" opacity="0.93"/>
<line x1="28" y1="465" x2="372" y2="465" stroke="#5868c8" stroke-width="0.9" opacity="0.55"/>
<g transform="translate(200 479)" fill="#5868c8" opacity="0.70">
  <path d="M -34,0 Q -17,-6 0,0 Q 17,6 34,0" fill="none" stroke="#5868c8" stroke-width="0.92"/>
  <circle cx="0" cy="0" r="2.6"/>
  <circle cx="-30" cy="0" r="1.3"/><circle cx="30" cy="0" r="1.3"/>
  <path d="M -50,0 L -40,0" stroke-width="0.7"/><path d="M 40,0 L 50,0" stroke-width="0.7"/>
</g>
<text x="200" y="511" text-anchor="middle"
  font-family="Georgia,serif" font-size="24" font-weight="700" letter-spacing="3"
  fill="#d4dcff" filter="url(#glow)">MISTAKENLY</text>
<text x="200" y="537" text-anchor="middle"
  font-family="Georgia,serif" font-size="11" font-weight="400" letter-spacing="5"
  fill="#5868c8" opacity="0.92">DRAGGED SURVIVAL</text>
<text x="200" y="557" text-anchor="middle"
  font-family="Georgia,serif" font-size="8" font-weight="400" letter-spacing="4"
  fill="#3a4888" opacity="0.84">TARHUALA</text>
</svg>
