<rect x="0" y="458" width="400" height="142" fill="#030200" opacity="0.94"/>
<line x1="28" y1="466" x2="372" y2="466" stroke="#d4a434" stroke-width="0.9" opacity="0.58"/>
<g transform="translate(200 481)" fill="#d4a434" opacity="0.68">
