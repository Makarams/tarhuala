<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="g">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="11"/>
    <feColorMatrix values="0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0 0.01  0 0 0 0.45 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="crownGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#120901"/>
    <stop offset="35%" stop-color="#0a0500"/>
    <stop offset="100%" stop-color="#020100"/>
  </linearGradient>
  <radialGradient id="goldAura" cx="50%" cy="42%" r="55%">
    <stop offset="0%" stop-color="#d4a434" stop-opacity="0.35"/>
    <stop offset="55%" stop-color="#6a4008" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="goldMetal" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8e090"/>
    <stop offset="25%" stop-color="#e8c040"/>
    <stop offset="55%" stop-color="#c89820"/>
    <stop offset="80%" stop-color="#8a6010"/>
    <stop offset="100%" stop-color="#3a2808"/>
  </linearGradient>
  <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fff8d0" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#f0c040" stop-opacity="0"/>
    <stop offset="100%" stop-color="#c08010" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="scrollFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0500" stop-opacity="0"/>
    <stop offset="100%" stop-color="#020100" stop-opacity="1"/>
  </linearGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="252" rx="230" ry="210" fill="url(#goldAura)"/>

<!-- subtle column / pillar architecture -->
<g stroke="#d4a434" stroke-width="0.5" fill="none" opacity="0.06">
  <line x1="60" y1="0" x2="60" y2="600"/>
  <line x1="120" y1="0" x2="120" y2="600"/>
  <line x1="280" y1="0" x2="280" y2="600"/>
  <line x1="340" y1="0" x2="340" y2="600"/>
</g>
<!-- arch / throne arch top -->
<path d="M 80 520 Q 80 100 200 80 Q 320 100 320 520" fill="none" stroke="#d4a434" stroke-width="0.8" opacity="0.12"/>
<path d="M 100 520 Q 100 120 200 104 Q 300 120 300 520" fill="none" stroke="#d4a434" stroke-width="0.5" opacity="0.08"/>

<!-- ── THE CROWN ── -->
<g transform="translate(200 200)" filter="url(#crownGlow)">
  <!-- crown ambient glow disc -->
  <ellipse cx="0" cy="20" rx="110" ry="55" fill="#d4a434" opacity="0.12"/>
</g>
<g transform="translate(200 200)" filter="url(#glow)">
  <!-- crown base band -->
  <rect x="-88" y="30" width="176" height="32" rx="4" fill="url(#goldMetal)"/>
  <rect x="-88" y="30" width="176" height="32" rx="4" fill="url(#goldShine)"/>
  <!-- band filigree -->
  <g stroke="#8a6010" stroke-width="0.7" fill="none" opacity="0.5">
    <path d="M -72 46 Q -60 38 -48 46 Q -36 54 -24 46 Q -12 38 0 46 Q 12 38 24 46 Q 36 54 48 46 Q 60 38 72 46"/>
  </g>
  <g fill="#120901" opacity="0.4">
    <circle cx="-66" cy="46" r="3"/><circle cx="-44" cy="46" r="3"/>
    <circle cx="-22" cy="46" r="3"/><circle cx="0"   cy="46" r="3.5"/>
    <circle cx="22"  cy="46" r="3"/><circle cx="44"  cy="46" r="3"/>
    <circle cx="66"  cy="46" r="3"/>
  </g>

  <!-- crown spires -->
  <!-- center tall spire -->
  <polygon points="0,-78 -14,30 14,30" fill="url(#goldMetal)"/>
  <polygon points="0,-78 -14,30 14,30" fill="url(#goldShine)"/>
  <!-- center jewel -->
  <polygon points="0,-90 6,-72 0,-58 -6,-72" fill="#d4a434" filter="url(#glow)"/>
  <polygon points="0,-90 6,-72 0,-58 -6,-72" fill="url(#goldShine)"/>
  <circle cx="0" cy="-74" r="5" fill="#f8e090" opacity="0.9"/>

  <!-- left-mid spires -->
  <polygon points="-44,-56 -54,30 -34,30" fill="url(#goldMetal)"/>
  <polygon points="-44,-56 -54,30 -34,30" fill="url(#goldShine)" opacity="0.7"/>
  <polygon points="-44,-66 -48,-52 -44,-44 -40,-52" fill="#d4a434"/>
  <circle cx="-44" cy="-54" r="4" fill="#f8d060" opacity="0.8"/>

  <polygon points="44,-56 34,30 54,30" fill="url(#goldMetal)"/>
  <polygon points="44,-56 34,30 54,30" fill="url(#goldShine)" opacity="0.7"/>
  <polygon points="44,-66 40,-52 44,-44 48,-52" fill="#d4a434"/>
  <circle cx="44" cy="-54" r="4" fill="#f8d060" opacity="0.8"/>

  <!-- outer short spires -->
  <polygon points="-76,-36 -84,30 -68,30" fill="url(#goldMetal)" opacity="0.9"/>
  <polygon points="-76,-44 -79,-34 -76,-28 -73,-34" fill="#d4a434" opacity="0.7"/>
  <polygon points="76,-36 68,30 84,30" fill="url(#goldMetal)" opacity="0.9"/>
  <polygon points="76,-44 73,-34 76,-28 79,-34" fill="#d4a434" opacity="0.7"/>
</g>

<!-- decorative kbach filigree above crown -->
<g transform="translate(200 120)" fill="none" stroke="#d4a434" stroke-width="0.7" opacity="0.35">
  <path d="M -80 0 Q -60 -20 -40 0 Q -20 20 0 0 Q 20 -20 40 0 Q 60 20 80 0"/>
  <path d="M -60 -14 Q -40 -30 -20 -14 Q 0 0 20 -14 Q 40 -30 60 -14" opacity="0.6"/>
</g>
<g transform="translate(200 120)" fill="#d4a434" opacity="0.5">
  <circle cx="0" cy="0" r="3.5"/>
  <circle cx="-40" cy="0" r="2"/><circle cx="40" cy="0" r="2"/>
  <circle cx="-80" cy="0" r="1.5"/><circle cx="80" cy="0" r="1.5"/>
</g>

<!-- scattered gold dust particles -->
<g fill="#d4a434">
  <circle cx="38"  cy="148" r="1"   opacity="0.6"/>
  <circle cx="80"  cy="110" r="1.4" opacity="0.5"/>
  <circle cx="145" cy="88"  r="0.9" opacity="0.55"/>
  <circle cx="255" cy="86"  r="1"   opacity="0.55"/>
  <circle cx="322" cy="108" r="1.2" opacity="0.5"/>
  <circle cx="365" cy="145" r="0.9" opacity="0.45"/>
  <circle cx="58"  cy="270" r="0.8" opacity="0.35"/>
  <circle cx="345" cy="265" r="0.8" opacity="0.35"/>
  <circle cx="110" cy="310" r="0.7" opacity="0.3"/>
  <circle cx="295" cy="308" r="0.7" opacity="0.3"/>
</g>

<!-- dark floor, throne base suggestions -->
<g fill="#060300" opacity="0.8">
  <rect x="0" y="490" width="400" height="110"/>
  <!-- throne steps -->
  <rect x="60"  y="490" width="280" height="8" rx="1" fill="#0a0600" opacity="0.9"/>
  <rect x="80"  y="478" width="240" height="12" rx="1" fill="#0c0700" opacity="0.7"/>
  <rect x="110" y="467" width="180" height="11" rx="1" fill="#0e0800" opacity="0.6"/>
  <!-- throne side pillars -->
  <rect x="95"  y="380" width="18" height="110" rx="2" fill="#100900"/>
  <rect x="287" y="380" width="18" height="110" rx="2" fill="#100900"/>
  <!-- pillar caps -->
  <rect x="90"  y="374" width="28" height="8" rx="2" fill="#1a1000" opacity="0.9"/>
  <rect x="282" y="374" width="28" height="8" rx="2" fill="#1a1000" opacity="0.9"/>
  <!-- pillar gold accents -->
</g>
<!-- pillar gold trim -->
<g stroke="#d4a434" stroke-width="0.5" fill="none" opacity="0.25">
  <rect x="95" y="380" width="18" height="110" rx="2"/>
  <rect x="287" y="380" width="18" height="110" rx="2"/>
  <rect x="90" y="374" width="28" height="8" rx="2"/>
  <rect x="282" y="374" width="28" height="8" rx="2"/>
</g>
<rect x="0" y="455" width="400" height="145" fill="url(#scrollFade)"/>

<!-- vignette -->
<radialGradient id="vig" cx="50%" cy="38%" r="75%">
  <stop offset="40%" stop-color="#000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0.9"/>
</radialGradient>
<rect width="400" height="600" fill="url(#vig)"/>

<!-- grain -->
<rect width="400" height="600" filter="url(#g)" opacity="0.5"/>

<!-- FRAME -->
<g stroke="#d4a434" stroke-width="2" fill="none" stroke-linecap="round">
  <path d="M 14 50 L 14 14 L 50 14"/>
  <path d="M 350 14 L 386 14 L 386 50"/>
  <path d="M 14 550 L 14 586 L 50 586"/>
  <path d="M 386 550 L 386 586 L 350 586"/>
</g>
<g fill="#d4a434" opacity="0.9">
  <circle cx="14" cy="14" r="3.5"/><circle cx="386" cy="14" r="3.5"/>
  <circle cx="14" cy="586" r="3.5"/><circle cx="386" cy="586" r="3.5"/>
</g>
<!-- inner frame -->
<g stroke="#d4a434" stroke-width="0.5" fill="none" opacity="0.3">
  <path d="M 22 56 L 22 22 L 56 22"/><path d="M 344 22 L 378 22 L 378 56"/>
  <path d="M 22 544 L 22 578 L 56 578"/><path d="M 378 544 L 378 578 L 344 578"/>
</g>
<rect x="10" y="10" width="380" height="580" fill="none" stroke="#d4a434" stroke-width="0.5" opacity="0.2"/>

<!-- TITLE -->
<rect x="0" y="460" width="400" height="140" fill="#030200" opacity="0.9"/>
<line x1="30" y1="468" x2="370" y2="468" stroke="#d4a434" stroke-width="0.8" opacity="0.55"/>
<g transform="translate(200 483)" fill="#d4a434" opacity="0.65">
  <path d="M -32,0 Q -16,-6 0,0 Q 16,6 32,0" fill="none" stroke="#d4a434" stroke-width="0.8"/>
  <circle cx="0" cy="0" r="2.5"/>
  <circle cx="-28" cy="0" r="1.2"/><circle cx="28" cy="0" r="1.2"/>
</g>
<text x="200" y="513" text-anchor="middle"
  font-family="Georgia,serif" font-size="24" font-weight="700" letter-spacing="2"
  fill="#f0d880" filter="url(#glow)">MONARCH</text>
<text x="200" y="537" text-anchor="middle"
  font-family="Georgia,serif" font-size="10" font-weight="400" letter-spacing="5"
  fill="#d4a434" opacity="0.9">OF DEPRAVITY</text>
<text x="200" y="557" text-anchor="middle"
  font-family="Georgia,serif" font-size="8" font-weight="400" letter-spacing="4"
  fill="#786a5a" opacity="0.8">TARHUALA</text>
</svg>
