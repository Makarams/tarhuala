<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="3" seed="13"/>
    <feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.04  0 0 0 0 0.01  0 0 0 0.48 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="crownhalo" x="-55%" y="-55%" width="210%" height="210%">
    <feGaussianBlur stdDeviation="20" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadowblur" x="-30%" y="-20%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#130a01"/>
    <stop offset="40%" stop-color="#0a0500"/>
    <stop offset="100%" stop-color="#020100"/>
  </linearGradient>
  <radialGradient id="goldAura" cx="50%" cy="40%" r="56%">
    <stop offset="0%" stop-color="#d4a434" stop-opacity="0.44"/>
    <stop offset="48%" stop-color="#6a4008" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="goldMetal" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#fff8d0"/>
    <stop offset="18%"  stop-color="#f0cc48"/>
    <stop offset="48%"  stop-color="#c89820"/>
    <stop offset="78%"  stop-color="#8a6010"/>
    <stop offset="100%" stop-color="#3a2808"/>
  </linearGradient>
  <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#fff8d0" stop-opacity="0.68"/>
    <stop offset="45%"  stop-color="#f0c040" stop-opacity="0"/>
    <stop offset="100%" stop-color="#c08010" stop-opacity="0.48"/>
  </linearGradient>
  <radialGradient id="shadowFig" cx="50%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#1a0e00" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="scrollFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#0a0500" stop-opacity="0"/>
    <stop offset="100%" stop-color="#020100" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="vig" cx="50%" cy="38%" r="76%">
    <stop offset="40%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.92"/>
  </radialGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="248" rx="235" ry="215" fill="url(#goldAura)"/>

<!-- throne room architecture -->
<!-- grand arch outline -->
<path d="M 68 540 Q 68 82 200 58 Q 332 82 332 540"
  fill="none" stroke="#d4a434" stroke-width="1.2" opacity="0.16"/>
<path d="M 92 540 Q 92 108 200 90 Q 308 108 308 540"
  fill="none" stroke="#d4a434" stroke-width="0.6" opacity="0.10"/>
<!-- inner arch repeat -->
<path d="M 114 540 Q 114 132 200 118 Q 286 132 286 540"
  fill="none" stroke="#d4a434" stroke-width="0.4" opacity="0.06"/>
<!-- ceiling coffering lines -->
<g stroke="#d4a434" stroke-width="0.35" fill="none" opacity="0.06">
  <line x1="0" y1="104" x2="400" y2="104"/>
  <line x1="0" y1="124" x2="400" y2="124"/>
  <line x1="0" y1="144" x2="400" y2="144"/>
</g>

<!-- THE SHADOW MAN — looming silhouette behind throne, seen in periphery -->
<g transform="translate(200 280)" filter="url(#shadowblur)" opacity="0.55">
  <!-- shadowy tall figure, vague humanoid, crown-like protrusions -->
  <path d="M -22,-148 Q -8,-170 0,-182 Q 8,-170 22,-148 Q 38,-128 32,-108 Q 26,-88 18,-72 Q 28,-56 28,-32 Q 28,0 20,32 Q 14,56 12,88 L -12,88 Q -14,56 -20,32 Q -28,0 -28,-32 Q -28,-56 -18,-72 Q -26,-88 -32,-108 Q -38,-128 -22,-148 Z"
    fill="#1a0e00"/>
  <!-- shadow antler/horn protrusions -->
  <path d="M -22,-148 Q -44,-156 -52,-140 Q -56,-128 -48,-120" fill="#150a00"/>
  <path d="M  22,-148 Q  44,-156  52,-140 Q  56,-128  48,-120" fill="#150a00"/>
  <path d="M -8,-170 Q -18,-188 -12,-200 Q -6,-208 0,-202" fill="#150a00"/>
  <path d="M  8,-170 Q  18,-188  12,-200 Q   6,-208  0,-202" fill="#150a00"/>
</g>

<!-- ── CROWN — 5-spire with heavy filigree ── -->
<g transform="translate(200 196)" filter="url(#crownhalo)">
  <ellipse cx="0" cy="18" rx="120" ry="62" fill="#d4a434" opacity="0.16"/>
</g>
<g transform="translate(200 196)" filter="url(#glow)">
  <!-- base band — ornate with multiple layers -->
  <rect x="-96" y="30" width="192" height="40" rx="5" fill="url(#goldMetal)"/>
  <rect x="-96" y="30" width="192" height="40" rx="5" fill="url(#goldShine)"/>
  <!-- upper band edge line -->
  <line x1="-96" y1="36" x2="96" y2="36" stroke="#fff8d0" stroke-width="0.7" opacity="0.38"/>
  <!-- lower band edge line -->
  <line x1="-96" y1="64" x2="96" y2="64" stroke="#6a4008" stroke-width="0.8" opacity="0.50"/>
  <!-- filigree wave on band -->
  <path d="M -82 50 Q -68 38 -54 50 Q -40 62 -27 50 Q -14 38 0 50 Q 14 38 27 50 Q 40 62 54 50 Q 68 38 82 50"
    stroke="#8a6010" stroke-width="1.1" fill="none" opacity="0.60"/>
  <!-- secondary filigree -->
  <path d="M -74 44 Q -60 38 -46 44 Q -32 50 -18 44 Q -4 38 10 44 Q 24 38 38 44 Q 52 38 66 44"
    stroke="#c89820" stroke-width="0.5" fill="none" opacity="0.35"/>
  <!-- gem studs -->
  <g fill="#0e0700"><circle cx="-76" cy="50" r="4"/><circle cx="-52" cy="50" r="4"/><circle cx="-27" cy="50" r="4"/><circle cx="0" cy="50" r="4.5"/><circle cx="27" cy="50" r="4"/><circle cx="52" cy="50" r="4"/><circle cx="76" cy="50" r="4"/></g>
  <g fill="#e8c040" opacity="0.50"><circle cx="-76" cy="48" r="1.5"/><circle cx="-52" cy="48" r="1.5"/><circle cx="-27" cy="48" r="1.5"/><circle cx="0" cy="47" r="1.8"/><circle cx="27" cy="48" r="1.5"/><circle cx="52" cy="48" r="1.5"/><circle cx="76" cy="48" r="1.5"/></g>

  <!-- center tall spire -->
  <polygon points="0,-106 -18,30 18,30" fill="url(#goldMetal)"/>
  <polygon points="0,-106 -18,30 18,30" fill="url(#goldShine)"/>
  <!-- center spire side details -->
  <line x1="0" y1="-106" x2="0" y2="30" stroke="#fff8d0" stroke-width="0.6" opacity="0.25"/>
  <!-- center spire cap -->
  <polygon points="0,-120 9,-96 0,-80 -9,-96" fill="#d4a434"/>
  <polygon points="0,-120 9,-96 0,-80 -9,-96" fill="url(#goldShine)"/>
  <circle cx="0" cy="-100" r="8" fill="#f8e890" opacity="0.94" filter="url(#glow)"/>
  <circle cx="0" cy="-100" r="4" fill="#fffbe0"/>

  <!-- inner left spire -->
  <polygon points="-50,-74 -62,30 -38,30" fill="url(#goldMetal)"/>
  <polygon points="-50,-74 -62,30 -38,30" fill="url(#goldShine)" opacity="0.7"/>
  <polygon points="-50,-88 -57,-68 -50,-56 -43,-68" fill="#d4a434"/>
  <circle cx="-50" cy="-72" r="5.5" fill="#f8d060" opacity="0.88" filter="url(#glow)"/>

  <!-- inner right spire -->
  <polygon points="50,-74 38,30 62,30" fill="url(#goldMetal)"/>
  <polygon points="50,-74 38,30 62,30" fill="url(#goldShine)" opacity="0.7"/>
  <polygon points="50,-88 43,-68 50,-56 57,-68" fill="#d4a434"/>
  <circle cx="50" cy="-72" r="5.5" fill="#f8d060" opacity="0.88" filter="url(#glow)"/>

  <!-- outer short spires -->
  <polygon points="-86,-48 -96,30 -76,30" fill="url(#goldMetal)" opacity="0.92"/>
  <polygon points="-86,-60 -91,-44 -86,-34 -81,-44" fill="#d4a434" opacity="0.80"/>
  <circle cx="-86" cy="-46" r="3.8" fill="#f8c840" opacity="0.75"/>
  <polygon points="86,-48 76,30 96,30" fill="url(#goldMetal)" opacity="0.92"/>
  <polygon points="86,-60 81,-44 86,-34 91,-44" fill="#d4a434" opacity="0.80"/>
  <circle cx="86" cy="-46" r="3.8" fill="#f8c840" opacity="0.75"/>

  <!-- crown arch connections between spires -->
  <path d="M -96,30 Q -68,14 -50,-10 Q -32,2 0,-16 Q 32,2 50,-10 Q 68,14 96,30"
    fill="none" stroke="#d4a434" stroke-width="1.0" opacity="0.42"/>
</g>

<!-- kbach filigree above crown -->
<g transform="translate(200 108)" fill="none" stroke="#d4a434" stroke-width="0.85" opacity="0.40">
  <path d="M -92,0 Q -68,-24 -46,0 Q -23,24 0,0 Q 23,-24 46,0 Q 68,24 92,0"/>
  <path d="M -68,-18 Q -46,-36 -23,-18 Q 0,0 23,-18 Q 46,-36 68,-18" opacity="0.60"/>
</g>
<g transform="translate(200 108)" fill="#d4a434" opacity="0.58">
  <circle cx="0"   cy="0" r="4.0"/>
  <circle cx="-46" cy="0" r="2.2"/><circle cx="46"  cy="0" r="2.2"/>
  <circle cx="-92" cy="0" r="1.6"/><circle cx="92"  cy="0" r="1.6"/>
</g>

<!-- gold dust particles -->
<g fill="#d4a434">
  <circle cx="36"  cy="144" r="1.2" opacity="0.65"/>
  <circle cx="80"  cy="108" r="1.6" opacity="0.54"/>
  <circle cx="144" cy="86"  r="1.1" opacity="0.58"/>
  <circle cx="258" cy="84"  r="1.2" opacity="0.58"/>
  <circle cx="326" cy="106" r="1.4" opacity="0.54"/>
  <circle cx="368" cy="144" r="1.1" opacity="0.48"/>
  <circle cx="56"  cy="270" r="1.0" opacity="0.40"/>
  <circle cx="348" cy="264" r="1.0" opacity="0.40"/>
  <circle cx="110" cy="308" r="0.9" opacity="0.34"/>
  <circle cx="294" cy="306" r="0.9" opacity="0.34"/>
  <circle cx="178" cy="64"  r="0.8" opacity="0.44"/>
  <circle cx="228" cy="60"  r="0.9" opacity="0.40"/>
</g>

<!-- THRONE BASE — steps + columns -->
<!-- column left -->
<rect x="74"  y="336" width="30" height="132" fill="#1a1000" opacity="0.96"/>
<rect x="78"  y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="87"  y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="96"  y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="64"  y="328" width="50" height="10" rx="2" fill="#1e1400" opacity="0.96"/>
<rect x="60"  y="322" width="58" height="8"  rx="1.5" fill="#261c00" opacity="0.90"/>
<rect x="64"  y="468" width="50" height="10" rx="2" fill="#1e1400" opacity="0.96"/>
<rect x="60"  y="478" width="58" height="8"  rx="1.5" fill="#261c00" opacity="0.90"/>
<rect x="74"  y="336" width="30" height="132" fill="none" stroke="#d4a434" stroke-width="1.3" opacity="0.68"/>
<rect x="64"  y="328" width="50" height="10" rx="2" fill="none" stroke="#d4a434" stroke-width="1.0" opacity="0.72"/>
<rect x="64"  y="468" width="50" height="10" rx="2" fill="none" stroke="#d4a434" stroke-width="1.0" opacity="0.72"/>
<g fill="#d4a434" opacity="0.65"><circle cx="82" cy="334" r="2.2"/><circle cx="91" cy="334" r="2.2"/><circle cx="100" cy="334" r="2.2"/></g>

<!-- column right -->
<rect x="296" y="336" width="30" height="132" fill="#1a1000" opacity="0.96"/>
<rect x="300" y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="309" y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="318" y="336" width="3"  height="132" fill="#221600" opacity="0.65"/>
<rect x="286" y="328" width="50" height="10" rx="2" fill="#1e1400" opacity="0.96"/>
<rect x="282" y="322" width="58" height="8"  rx="1.5" fill="#261c00" opacity="0.90"/>
<rect x="286" y="468" width="50" height="10" rx="2" fill="#1e1400" opacity="0.96"/>
<rect x="282" y="478" width="58" height="8"  rx="1.5" fill="#261c00" opacity="0.90"/>
<rect x="296" y="336" width="30" height="132" fill="none" stroke="#d4a434" stroke-width="1.3" opacity="0.68"/>
<rect x="286" y="328" width="50" height="10" rx="2" fill="none" stroke="#d4a434" stroke-width="1.0" opacity="0.72"/>
<rect x="286" y="468" width="50" height="10" rx="2" fill="none" stroke="#d4a434" stroke-width="1.0" opacity="0.72"/>
<g fill="#d4a434" opacity="0.65"><circle cx="300" cy="334" r="2.2"/><circle cx="309" cy="334" r="2.2"/><circle cx="318" cy="334" r="2.2"/></g>

<!-- lintel beam -->
<rect x="58" y="320" width="284" height="6" rx="1" fill="#1e1400" opacity="0.72"/>
<rect x="58" y="320" width="284" height="6" rx="1" fill="none" stroke="#d4a434" stroke-width="0.8" opacity="0.52"/>

<!-- throne steps -->
<rect x="0"   y="488" width="400" height="112" fill="#060300" opacity="0.84"/>
<rect x="52"  y="488" width="296" height="9"   rx="1.5" fill="#0c0700" opacity="0.92"/>
