<rect x="106" y="466" width="188" height="13"  rx="1.5" fill="#100900" opacity="0.64"/>

<!-- ritual circle on floor — Alden's death ritual -->
<g transform="translate(200 472)" opacity="0.32">
  <circle r="36" fill="none" stroke="#d4a434" stroke-width="0.8"/>
  <circle r="28" fill="none" stroke="#d4a434" stroke-width="0.5"/>
  <!-- pentagram-like ritual lines -->
  <polygon points="0,-32 30,10 -18,26 18,26 -30,10" fill="none" stroke="#d4a434" stroke-width="0.6"/>
  <!-- small mouse silhouette at altar -->
  <ellipse cx="0" cy="2" rx="5" ry="3.5" fill="#d4a434" opacity="0.55"/>
  <ellipse cx="5.5" cy="0.5" rx="2.8" ry="2" fill="#d4a434" opacity="0.55"/>
  <path d="M -5 4 Q -9 8 -8 12" stroke="#d4a434" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</g>

<rect x="0" y="452" width="400" height="148" fill="url(#scrollFade)"/>
<rect width="400" height="600" fill="url(#vig)"/>
<rect width="400" height="600" filter="url(#grain)" opacity="0.52"/>

<!-- CORNER FRAMES -->
<g stroke="#d4a434" stroke-width="1.9" fill="none" stroke-linecap="round">
  <path d="M 14 46 L 14 14 L 46 14"/><path d="M 354 14 L 386 14 L 386 46"/>
  <path d="M 14 554 L 14 586 L 46 586"/><path d="M 386 554 L 386 586 L 354 586"/>
</g>
