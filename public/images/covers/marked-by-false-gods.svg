  <path d="M 158 322 Q 146 358 154 398 Q 164 432 148 468"/>
  <path d="M 178 330 Q 170 368 176 408 Q 184 442 170 476"/>
  <path d="M 200 338 Q 196 376 202 416 Q 208 450 196 484"/>
  <path d="M 222 330 Q 230 368 224 408 Q 216 442 230 476"/>
