  <circle cx="176" cy="408" r="3.0"/><circle cx="170" cy="476" r="2.4"/>
  <circle cx="202" cy="416" r="3.4"/><circle cx="196" cy="484" r="2.6"/>
  <circle cx="224" cy="408" r="3.0"/><circle cx="230" cy="476" r="2.4"/>
  <circle cx="246" cy="398" r="3.0"/><circle cx="252" cy="468" r="2.4"/>
</g>

<!-- floating spores -->
