  <circle cx="232" cy="70"  r="1.2" opacity="0.50"/>
</g>

<!-- kbach above hand -->
<g transform="translate(200 96)" fill="none" stroke="#38a870" stroke-width="0.90" opacity="0.38">
  <path d="M -92,0 Q -68,-24 -46,0 Q -23,24 0,0 Q 23,-24 46,0 Q 68,24 92,0"/>
  <path d="M -68,-18 Q -46,-36 -23,-18 Q 0,0 23,-18 Q 46,-36 68,-18" opacity="0.55"/>
</g>
