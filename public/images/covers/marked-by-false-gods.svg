<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="4" seed="9"/>
    <feColorMatrix values="0 0 0 0 0.02  0 0 0 0 0.05  0 0 0 0 0.03  0 0 0 0.52 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="deephalo" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="36" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="eyeshine" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060e08"/>
    <stop offset="42%" stop-color="#040d05"/>
    <stop offset="100%" stop-color="#010301"/>
  </linearGradient>
  <radialGradient id="jadeAura" cx="50%" cy="44%" r="58%">
    <stop offset="0%" stop-color="#38a870" stop-opacity="0.48"/>
    <stop offset="48%" stop-color="#165c32" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="eyeCore" cx="38%" cy="34%" r="68%">
    <stop offset="0%"  stop-color="#d8fff0"/>
    <stop offset="16%" stop-color="#60e0a0"/>
    <stop offset="48%" stop-color="#1a7848"/>
    <stop offset="100%" stop-color="#092418" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="handSurface" cx="38%" cy="28%" r="72%">
    <stop offset="0%"  stop-color="#1c4830"/>
    <stop offset="52%" stop-color="#0d2c1a"/>
    <stop offset="100%" stop-color="#061410"/>
  </radialGradient>
  <linearGradient id="marshFog" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0e2c16" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="vig" cx="50%" cy="42%" r="78%">
    <stop offset="40%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.92"/>
  </radialGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="252" rx="235" ry="218" fill="url(#jadeAura)"/>

<!-- rain — fine vertical streaks -->
<g stroke="#1a6838" stroke-width="0.5" fill="none" opacity="0.16">
  <path d="M 26  0 Q 16 152 32 312 Q 48 460 22 600"/>
  <path d="M 74  0 Q 64 182 78 362 Q 92 512 68 600"/>
  <path d="M 140 0 Q 126 202 144 382 Q 160 546 136 600"/>
  <path d="M 220 0 Q 210 172 226 352 Q 240 506 214 600"/>
  <path d="M 296 0 Q 284 192 300 370 Q 316 520 290 600"/>
  <path d="M 358 0 Q 346 162 364 332 Q 378 482 352 600"/>
  <path d="M 50  0 Q 42 138 58 288 Q 72 426 48 600" opacity="0.08"/>
  <path d="M 170 0 Q 162 168 178 338 Q 192 492 168 600" opacity="0.08"/>
  <path d="M 328 0 Q 318 172 336 342 Q 352 492 326 600" opacity="0.08"/>
</g>

<!-- surveillance orbit rings -->
<g transform="translate(200 234)" filter="url(#deephalo)">
  <circle r="160" fill="none" stroke="#38a870" stroke-width="1.5" opacity="0.08"/>
  <circle r="138" fill="none" stroke="#38a870" stroke-width="2.0" opacity="0.12"/>
</g>
<g transform="translate(200 234)">
  <circle r="156" fill="none" stroke="#1e6040" stroke-width="1.2" stroke-dasharray="8,12" opacity="0.28"/>
  <circle r="134" fill="none" stroke="#2a7850" stroke-width="1.0" stroke-dasharray="5,9"  opacity="0.34"/>
  <circle r="112" fill="none" stroke="#38a870" stroke-width="0.8" stroke-dasharray="3,7"  opacity="0.28"/>
  <!-- 8 watching eye-nodes on outer ring -->
  <g filter="url(#glow)" opacity="0.78">
    <ellipse cx="0"    cy="-156" rx="3.5" ry="2.0" fill="#50c490"/>
    <ellipse cx="0"    cy="156"  rx="3.5" ry="2.0" fill="#50c490"/>
    <ellipse cx="-156" cy="0"    rx="2.0" ry="3.5" fill="#50c490"/>
    <ellipse cx="156"  cy="0"    rx="2.0" ry="3.5" fill="#50c490"/>
    <ellipse cx="-110" cy="-110" rx="3.0" ry="1.8" fill="#3a9468" transform="rotate(-45 -110 -110)"/>
    <ellipse cx="110"  cy="-110" rx="3.0" ry="1.8" fill="#3a9468" transform="rotate(45 110 -110)"/>
    <ellipse cx="-110" cy="110"  rx="3.0" ry="1.8" fill="#3a9468" transform="rotate(45 -110 110)"/>
    <ellipse cx="110"  cy="110"  rx="3.0" ry="1.8" fill="#3a9468" transform="rotate(-45 110 110)"/>
  </g>
</g>

<!-- ── THE HAND ── -->
<g transform="translate(200 234)" filter="url(#glow)">
  <!-- hand shadow for depth -->
  <path d="M -54 72 Q -62 22 -60 -8 Q -58 -36 -52 -44 Q -44 -52 -36 -44 Q -32 -38 -32 -18 L -32 -64 Q -31 -88 -22 -90 Q -12 -92 -12 -68 L -12 -94 Q -11 -118 -2 -119 Q 8 -120 9 -96 L 9 -70 Q 10,-102 21,-102 Q 31,-102 32,-76 L 32,-46 Q 33,-76 44,-74 Q 54,-72 54,-46 Q 58,-12 62,72 Q 32,92 -30,92 Z"
    fill="#061410" opacity="0.60" transform="translate(4 6)"/>

  <!-- palm -->
  <path d="M -54 72 Q -62 22 -60 -8 Q -58 -36 -52 -44 Q -44 -52 -36 -44 Q -32 -38 -32 -18 L -32 -64 Q -31 -88 -22 -90 Q -12 -92 -12 -68 L -12 -94 Q -11 -118 -2 -119 Q 8 -120 9 -96 L 9 -70 Q 10,-102 21,-102 Q 31,-102 32,-76 L 32,-46 Q 33,-76 44,-74 Q 54,-72 54,-46 Q 58,-12 62,72 Q 32,92 -30,92 Z"
    fill="url(#handSurface)" stroke="#38a870" stroke-width="1.8"/>

  <!-- surface sheen on upper palm -->
  <path d="M -52,-44 Q -36,-60 -12,-68 Q 8,-72 26,-62 Q 40,-54 48,-38 Q 36,-48 18,-52 Q -4,-54 -22,-46 Q -38,-38 -52,-44 Z"
    fill="#ffffff" opacity="0.09"/>

  <!-- finger separation lines -->
  <g stroke="#0a2018" stroke-width="0.9" fill="none" opacity="0.60">
    <line x1="-32" y1="-44" x2="-22" y2="-88"/>
    <line x1="-12" y1="-68" x2="-2"  y2="-118"/>
    <line x1=" 9"  y1="-70" x2=" 20" y2="-100"/>
    <line x1=" 32" y1="-46" x2=" 43" y2="-72"/>
  </g>
  <!-- knuckle creases -->
  <g stroke="#0a2018" stroke-width="0.7" fill="none" opacity="0.50">
    <path d="M -38 -50 Q -28 -56 -18 -50"/>
    <path d="M -14 -74 Q -4  -80  8  -74"/>
    <path d="M  8  -54 Q  20 -60  30 -54"/>
    <path d="M  32 -30 Q  42 -34  50 -28"/>
  </g>
  <!-- palm life lines -->
  <g stroke="#1a4828" stroke-width="0.9" fill="none" opacity="0.42">
    <path d="M -46 8  Q -10 -2  32 6"/>
    <path d="M -42 28 Q  -6 18  30 26"/>
    <path d="M -34 54 Q  -2 44  28 52"/>
  </g>
  <!-- thumb outline -->
  <path d="M -54 14 Q -70 -2 -64 -24 Q -58 -42 -52 -44"
    fill="none" stroke="#38a870" stroke-width="1.4" opacity="0.55"/>

  <!-- crack network radiating from palm eye -->
  <g stroke="#5ad898" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.80">
    <path d="M 0 0 Q -20 -24 -34 -50"/>
    <path d="M 0 0 Q  18 -22  28 -48"/>
    <path d="M 0 0 Q -24  16 -42  40"/>
    <path d="M 0 0 Q  20  14  36  46"/>
    <path d="M 0 0 Q -30   2 -56  10"/>
    <path d="M 0 0 Q  30   0  56   8"/>
  </g>
  <!-- hairline secondaries -->
  <g stroke="#2a9860" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.48">
    <path d="M -34 -50 Q -40 -64 -36 -78"/>
    <path d="M  28 -48 Q  34 -62  30 -76"/>
    <path d="M -42  40 Q -50  56 -46  72"/>
    <path d="M  36  46 Q  44  62  42  78"/>
    <path d="M -56  10 Q -60  -2 -58 -18"/>
    <path d="M  56   8 Q  60  -4  58 -20"/>
  </g>
  <!-- crack node glows -->
  <g fill="#60e8a8" filter="url(#eyeshine)" opacity="0.65">
    <circle cx="-34" cy="-50" r="3.0"/>
    <circle cx=" 28" cy="-48" r="3.0"/>
    <circle cx="-42" cy=" 40" r="2.6"/>
    <circle cx=" 36" cy=" 46" r="2.6"/>
    <circle cx="-56" cy=" 10" r="2.0"/>
    <circle cx=" 56" cy="  8" r="2.0"/>
  </g>

  <!-- ── PALM EYE ── -->
  <ellipse cx="0" cy="0" rx="34" ry="22" fill="#186042" opacity="0.40" filter="url(#eyeshine)"/>
  <!-- sclera -->
  <ellipse cx="0" cy="0" rx="32" ry="20" fill="#050e08" stroke="#38a870" stroke-width="2.0"/>
  <!-- iris ring -->
  <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#eyeCore)"/>
  <!-- pupil -->
  <circle cx="0" cy="0" r="10" fill="#030806"/>
  <!-- iris detail rings -->
  <ellipse cx="0" cy="0" rx="17" ry="11" fill="none" stroke="#50c490" stroke-width="0.8" opacity="0.55"/>
  <ellipse cx="0" cy="0" rx="12" ry="8"  fill="none" stroke="#60d898" stroke-width="0.5" opacity="0.40"/>
  <!-- highlight -->
  <circle cx="-7" cy="-5" r="4.5" fill="#ffffff" opacity="0.72"/>
  <circle cx="-6" cy="-5" r="2.0" fill="#ffffff" opacity="0.90"/>
  <!-- eyelid arcs -->
  <path d="M -32 0 Q 0 -24 32 0" fill="none" stroke="#38a870" stroke-width="1.4" opacity="0.58"/>
  <path d="M -32 0 Q 0  18 32 0" fill="none" stroke="#38a870" stroke-width="1.0" opacity="0.44"/>
  <!-- lashes top -->
  <g stroke="#2a8858" stroke-width="1.0" stroke-linecap="round" opacity="0.55">
    <line x1="-25" y1="-12" x2="-29" y2="-20"/>
    <line x1="-14" y1="-18" x2="-15" y2="-26"/>
    <line x1="  0" y1="-20" x2="  0" y2="-28"/>
    <line x1=" 14" y1="-18" x2=" 16" y2="-26"/>
    <line x1=" 25" y1="-12" x2=" 29" y2="-20"/>
  </g>
</g>

<!-- dripping ichor tendrils down -->
