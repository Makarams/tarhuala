  <circle cx="44"  cy="158" r="1.6" opacity="0.65"/>
  <circle cx="90"  cy="124" r="1.1" opacity="0.54"/>
  <circle cx="154" cy="100" r="1.4" opacity="0.60"/>
  <circle cx="250" cy="98"  r="1.2" opacity="0.55"/>
  <circle cx="316" cy="122" r="1.5" opacity="0.60"/>
  <circle cx="362" cy="156" r="1.1" opacity="0.50"/>
