  <circle cx="-46" cy="0" r="2.2"/><circle cx="46"  cy="0" r="2.2"/>
  <circle cx="-92" cy="0" r="1.6"/><circle cx="92"  cy="0" r="1.6"/>
</g>

<!-- marsh silhouette -->
<g fill="#010402" opacity="0.94">
  <rect x="0" y="488" width="400" height="112"/>
  <!-- reed bank with varying heights -->
  <polygon points="0,488 0,452 8,436 16,452 24,430 34,448 42,438 52,456 62,444 72,460 82,450 92,470 102,456 112,488"/>
  <polygon points="108,488 116,462 124,446 132,456 140,440 148,454 156,446 164,460 172,450 180,470 190,488"/>
  <polygon points="186,488 194,462 200,450 206,462 214,488"/>
  <polygon points="218,488 228,462 236,446 244,456 252,440 260,454 268,446 276,460 286,450 294,470 302,488"/>
  <polygon points="298,488 308,456 316,444 326,460 336,450 346,440 356,452 368,438 378,454 388,444 398,460 400,462 400,488"/>
  <!-- water surface lily pads -->
  <ellipse cx="88"  cy="510" rx="26" ry="9"  fill="#060e07" opacity="0.94"/>
  <ellipse cx="200" cy="504" rx="32" ry="10" fill="#060e07" opacity="0.94"/>
  <ellipse cx="318" cy="512" rx="24" ry="8"  fill="#060e07" opacity="0.94"/>
  <!-- water shimmer -->
  <ellipse cx="140" cy="522" rx="18" ry="4"  fill="#0a1e0c" opacity="0.60"/>
  <ellipse cx="268" cy="520" rx="20" ry="4"  fill="#0a1e0c" opacity="0.60"/>
</g>
<!-- mist at base of reeds -->
<ellipse cx="200" cy="498" rx="200" ry="22" fill="#0e3018" opacity="0.18"/>
<rect x="0" y="452" width="400" height="148" fill="url(#marshFog)"/>

<rect width="400" height="600" fill="url(#vig)"/>
<rect width="400" height="600" filter="url(#grain)" opacity="0.52"/>

<!-- CORNER FRAMES -->
