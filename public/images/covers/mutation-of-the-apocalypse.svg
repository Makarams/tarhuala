<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="5"/>
    <feColorMatrix values="0 0 0 0 0.07  0 0 0 0 0.01  0 0 0 0 0.01  0 0 0 0.55 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="haloglow" x="-55%" y="-55%" width="210%" height="210%">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="deephalo" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="40" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="bg" cx="50%" cy="36%" r="70%">
    <stop offset="0%" stop-color="#2e0c06"/>
    <stop offset="40%" stop-color="#160504"/>
    <stop offset="100%" stop-color="#040101"/>
  </radialGradient>
  <radialGradient id="corona" cx="50%" cy="36%" r="54%">
    <stop offset="0%" stop-color="#ff4820" stop-opacity="0.6"/>
    <stop offset="45%" stop-color="#c03010" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="suncore" cx="42%" cy="36%" r="62%">
    <stop offset="0%" stop-color="#fffbe8"/>
    <stop offset="12%" stop-color="#ffcc60"/>
    <stop offset="32%" stop-color="#ff7030"/>
    <stop offset="62%" stop-color="#d03010"/>
    <stop offset="88%" stop-color="#6a1006"/>
    <stop offset="100%" stop-color="#3a0a04" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="groundFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="vig" cx="50%" cy="40%" r="76%">
    <stop offset="44%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.94"/>
  </radialGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="218" rx="228" ry="208" fill="url(#corona)"/>

<!-- horizon haze bands -->
<ellipse cx="200" cy="358" rx="260" ry="32" fill="#c03010" opacity="0.20"/>
<ellipse cx="200" cy="372" rx="210" ry="20" fill="#7a1a08" opacity="0.28"/>
<rect x="0" y="346" width="400" height="4" fill="#e84030" opacity="0.12"/>

<!-- deep sun halo -->
<g transform="translate(200 214)" filter="url(#deephalo)">
  <circle r="90" fill="#e04020" opacity="0.28"/>
</g>

<!-- SUN outer atmosphere rings -->
<g transform="translate(200 214)" filter="url(#haloglow)">
  <circle r="152" fill="none" stroke="#c03010" stroke-width="0.8" opacity="0.08"/>
  <circle r="130" fill="none" stroke="#d03010" stroke-width="1.2" opacity="0.14"/>
  <circle r="108" fill="none" stroke="#e04020" stroke-width="1.0" opacity="0.20"/>
  <circle r="88"  fill="none" stroke="#f05030" stroke-width="0.8" opacity="0.30"/>
</g>

<g transform="translate(200 214)" filter="url(#glow)">
  <!-- 8-ray burst — sharp diamond-tip rays -->
  <g fill="#ff8030" opacity="0.70">
    <path d="M 0,-130 L 6,-84 L 0,-72 L -6,-84 Z"/>
    <path d="M 0, 130 L 6, 84 L 0, 72 L -6, 84 Z"/>
    <path d="M -130,0 L -84, 6 L -72,0 L -84,-6 Z"/>
    <path d="M  130,0 L  84, 6 L  72,0 L  84,-6 Z"/>
  </g>
  <!-- diagonal rays, slightly shorter -->
  <g fill="#ff6020" opacity="0.58" transform="rotate(45)">
    <path d="M 0,-118 L 5,-78 L 0,-68 L -5,-78 Z"/>
    <path d="M 0, 118 L 5, 78 L 0, 68 L -5, 78 Z"/>
    <path d="M -118,0 L -78, 5 L -68,0 L -78,-5 Z"/>
    <path d="M  118,0 L  78, 5 L  68,0 L  78,-5 Z"/>
  </g>
  <!-- 16 secondary thin rays -->
  <g stroke="#ff9040" stroke-width="0.7" fill="none" opacity="0.30">
    <g transform="rotate(22.5)">
      <line x1="0" y1="-110" x2="0" y2="-86"/>
      <line x1="0" y1=" 110" x2="0" y2=" 86"/>
      <line x1="-110" y1="0" x2="-86" y2="0"/>
      <line x1=" 110" y1="0" x2=" 86" y2="0"/>
    </g>
    <g transform="rotate(67.5)">
      <line x1="0" y1="-106" x2="0" y2="-84"/>
      <line x1="0" y1=" 106" x2="0" y2=" 84"/>
      <line x1="-106" y1="0" x2="-84" y2="0"/>
      <line x1=" 106" y1="0" x2=" 84" y2="0"/>
    </g>
  </g>

  <!-- sun disc -->
  <circle r="76" fill="url(#suncore)"/>

  <!-- inner ring details -->
  <circle r="62" fill="none" stroke="#ff9050" stroke-width="1.4" opacity="0.55"/>
  <circle r="48" fill="none" stroke="#ff7030" stroke-width="0.9" opacity="0.44"/>
  <!-- sun spots — mutation marks -->
  <circle cx="18"  cy="-22" r="5.5" fill="#0e0505" opacity="0.72"/>
  <circle cx="-20" cy="16"  r="4"   fill="#0e0505" opacity="0.68"/>
  <circle cx="10"  cy="28"  r="3"   fill="#0e0505" opacity="0.55"/>
  <!-- dark core -->
  <circle r="26" fill="#0e0505" stroke="#d94030" stroke-width="1.8"/>
  <circle r="16" fill="#e04030" opacity="0.90"/>
  <circle r="9"  fill="#ffb068"/>
  <circle r="3.5" fill="#fffbe8"/>
</g>

<!-- sky fracture veins — cracks from the mutation event -->
<g stroke="#d94830" stroke-width="2.0" fill="none" stroke-linecap="round" opacity="0.58">
  <path d="M 52 104 Q 96 150 116 198 Q 136 248 102 298"/>
  <path d="M 348 98 Q 310 154 288 202 Q 266 254 300 298"/>
  <path d="M 18 190 Q 74 206 96 232 Q 116 260 80 308"/>
  <path d="M 382 184 Q 328 208 306 236 Q 284 266 318 308"/>
  <path d="M 130 68 Q 150 130 140 182"/>
  <path d="M 270 66 Q 254 128 266 180"/>
</g>
<!-- secondary hairlines -->
<g stroke="#c03820" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.38">
  <path d="M 102 298 Q 90 318 96 342"/>
  <path d="M 300 298 Q 312 316 306 342"/>
  <path d="M 80  308 Q 68  328 72 352"/>
  <path d="M 318 308 Q 330 326 328 352"/>
  <path d="M 140 182 Q 130 196 120 188"/>
  <path d="M 266 180 Q 278 194 288 186"/>
</g>
<!-- fracture node glows -->
<g fill="#ff7030" filter="url(#glow)" opacity="0.72">
  <circle cx="116" cy="198" r="3.0"/>
  <circle cx="288" cy="202" r="3.0"/>
  <circle cx="96"  cy="232" r="2.4"/>
  <circle cx="306" cy="236" r="2.4"/>
  <circle cx="140" cy="182" r="2.0"/>
  <circle cx="266" cy="180" r="2.0"/>
</g>

<!-- floating ash particles -->
<g fill="#ff6030">
  <circle cx="44"  cy="158" r="1.4" opacity="0.65"/>
  <circle cx="90"  cy="132" r="1.0" opacity="0.54"/>
  <circle cx="150" cy="114" r="1.2" opacity="0.60"/>
  <circle cx="252" cy="112" r="1.1" opacity="0.54"/>
  <circle cx="312" cy="130" r="1.3" opacity="0.65"/>
  <circle cx="358" cy="154" r="0.9" opacity="0.50"/>
  <circle cx="66"  cy="292" r="1.2" opacity="0.44"/>
  <circle cx="338" cy="286" r="1.0" opacity="0.44"/>
  <circle cx="188" cy="82"  r="0.9" opacity="0.55"/>
  <circle cx="220" cy="78"  r="1.2" opacity="0.46"/>
  <circle cx="162" cy="44"  r="0.8" opacity="0.42"/>
  <circle cx="242" cy="34"  r="0.8" opacity="0.40"/>
  <circle cx="294" cy="50"  r="0.7" opacity="0.38"/>
</g>

<!-- RUINS SILHOUETTE — layered with broken arches -->
<!-- far back: distant rubble horizon -->
<g fill="#100302" opacity="0.60">
  <polygon points="0,440 0,426 12,418 24,428 36,414 50,424 66,410 80,420 96,406 112,416 128,408 144,420 160,410 176,422 192,412 208,424 224,412 240,422 256,408 272,418 288,406 304,416 320,408 336,420 352,410 368,422 384,412 400,424 400,440"/>
</g>
<!-- mid layer: ruined city blocks -->
<g fill="#0a0202" opacity="0.82">
  <rect x="0" y="432" width="400" height="168"/>
  <!-- left ruin tower with broken top -->
  <polygon points="0,492 0,390 12,374 22,360 30,370 38,352 48,364 58,356 68,368 78,492"/>
  <!-- left tower broken arch window -->
  <path d="M 22 430 Q 32 416 42 430 L 42 454 L 22 454 Z" fill="#160404"/>
  <!-- second left structure -->
  <rect x="90" y="434" width="44" height="58"/>
  <polygon points="90,434 112,404 134,434"/>
  <!-- mid broken arch bridge fragment -->
  <path d="M 138 478 Q 170 448 202 478" fill="none" stroke="#0a0202" stroke-width="14"/>
  <path d="M 138 478 Q 170 448 202 478 L 202 492 L 138 492 Z" fill="#0a0202"/>
  <!-- rubble pile centre -->
  <polygon points="158,492 166,468 172,476 180,456 188,472 196,460 204,474 212,462 218,474 226,458 234,472 242,480 250,492"/>
  <!-- right ruin tower -->
  <polygon points="322,492 322,406 332,394 342,382 350,392 360,374 370,386 380,376 390,388 400,392 400,492"/>
  <!-- right tower arch window -->
  <path d="M 336 440 Q 346 424 356 440 L 356 462 L 336 462 Z" fill="#160404"/>
  <!-- far right broken wall -->
  <rect x="268" y="448" width="48" height="44"/>
  <polygon points="268,448 290,420 314,448"/>
  <!-- debris at base — scattered chunks -->
  <polygon points="0,492 16,484 28,492"/>
  <polygon points="48,492 60,482 76,492"/>
  <polygon points="240,492 258,480 274,492"/>
  <polygon points="296,492 312,484 326,492"/>
</g>
<!-- ember glow at base of ruins -->
<g filter="url(#glow)">
  <ellipse cx="40"  cy="488" rx="18" ry="5" fill="#e04020" opacity="0.28"/>
  <ellipse cx="180" cy="490" rx="24" ry="6" fill="#ff6020" opacity="0.22"/>
  <ellipse cx="360" cy="486" rx="16" ry="4" fill="#e04020" opacity="0.26"/>
</g>

<rect x="0" y="452" width="400" height="148" fill="url(#groundFade)"/>
<rect width="400" height="600" fill="url(#vig)"/>
<rect width="400" height="600" filter="url(#grain)" opacity="0.58"/>

<!-- CORNER FRAMES -->
<g stroke="#d94830" stroke-width="1.9" fill="none" stroke-linecap="round">
  <path d="M 14 46 L 14 14 L 46 14"/><path d="M 354 14 L 386 14 L 386 46"/>
  <path d="M 14 554 L 14 586 L 46 586"/><path d="M 386 554 L 386 586 L 354 586"/>
</g>
<g fill="#d94830" opacity="0.92">
  <circle cx="14" cy="14" r="3.2"/><circle cx="386" cy="14" r="3.2"/>
  <circle cx="14" cy="586" r="3.2"/><circle cx="386" cy="586" r="3.2"/>
</g>
<g fill="#d94830" opacity="0.50" stroke="#d94830" stroke-width="0.5">
  <path d="M 22 22 Q 34 22 34 34 Q 22 34 22 22 Z"/>
  <path d="M 378 22 Q 366 22 366 34 Q 378 34 378 22 Z"/>
  <path d="M 22 578 Q 34 578 34 566 Q 22 566 22 578 Z"/>
  <path d="M 378 578 Q 366 578 366 566 Q 378 566 378 578 Z"/>
</g>
<rect x="10" y="10" width="380" height="580" fill="none" stroke="#d94830" stroke-width="0.6" opacity="0.38"/>

<!-- TITLE AREA -->
<rect x="0" y="456" width="400" height="144" fill="#040101" opacity="0.90"/>
<line x1="28" y1="465" x2="372" y2="465" stroke="#d94830" stroke-width="0.9" opacity="0.55"/>
<g transform="translate(200 478)" fill="#d94830" opacity="0.72">
  <path d="M -32,0 Q -16,-6 0,0 Q 16,6 32,0" fill="none" stroke="#d94830" stroke-width="0.9"/>
  <circle cx="0" cy="0" r="2.4"/>
  <circle cx="-28" cy="0" r="1.3"/><circle cx="28" cy="0" r="1.3"/>
  <path d="M -46,0 L -38,0" stroke="#d94830" stroke-width="0.7"/>
  <path d="M 38,0 L 46,0" stroke="#d94830" stroke-width="0.7"/>
</g>
<text x="200" y="510" text-anchor="middle"
  font-family="Georgia,serif" font-size="27" font-weight="700" letter-spacing="3"
  fill="#f5e0d0" filter="url(#glow)">MUTATION</text>
<text x="200" y="536" text-anchor="middle"
  font-family="Georgia,serif" font-size="11" font-weight="400" letter-spacing="6"
  fill="#d94830" opacity="0.92">OF THE APOCALYPSE</text>
<text x="200" y="557" text-anchor="middle"
  font-family="Georgia,serif" font-size="8" font-weight="400" letter-spacing="4"
  fill="#7a6258" opacity="0.82">TARHUALA</text>
</svg>
