  <line x1="0" y1="108" x2="400" y2="108"/>
  <line x1="0" y1="132" x2="400" y2="132"/>
  <line x1="0" y1="156" x2="400" y2="156"/>
</g>
<!-- side curtain masses -->
<path d="M 0 0 Q 44 90 26 200 Q 12 278 30 370 Q 48 444 26 530 L 0 530 Z" fill="#080604" opacity="0.72"/>
<path d="M 400 0 Q 356 90 374 200 Q 388 278 370 370 Q 352 444 374 530 L 400 530 Z" fill="#080604" opacity="0.72"/>
