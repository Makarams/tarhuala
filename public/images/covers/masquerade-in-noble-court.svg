  <circle cx="107" cy="194" r="1.2"/>
  <circle cx="293" cy="194" r="1.2"/>
  <circle cx="307" cy="194" r="1.2"/>
</g>

<!-- temple scrollwork — symmetric, threading into the feather base -->
