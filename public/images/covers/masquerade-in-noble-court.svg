<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="11"/>
    <feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0 0.03  0 0 0 0.44 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="maskhalo" x="-55%" y="-55%" width="210%" height="210%">
    <feGaussianBlur stdDeviation="26" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="eyeshine" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#100d08"/>
    <stop offset="48%" stop-color="#0a0806"/>
    <stop offset="100%" stop-color="#030202"/>
  </linearGradient>
  <radialGradient id="ivoryAura" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#e8dfc0" stop-opacity="0.32"/>
    <stop offset="52%" stop-color="#c0a870" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="maskFace" cx="36%" cy="28%" r="74%">
    <stop offset="0%"   stop-color="#f8f0dc"/>
    <stop offset="28%"  stop-color="#e8d49a"/>
    <stop offset="62%"  stop-color="#c09448"/>
    <stop offset="88%"  stop-color="#7a5828"/>
    <stop offset="100%" stop-color="#3e2610"/>
  </radialGradient>
  <linearGradient id="maskEdgeSheen" x1="0" y1="0" x2="1" y2="0.5">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
    <stop offset="40%"  stop-color="#f0c840" stop-opacity="0"/>
    <stop offset="100%" stop-color="#c08010" stop-opacity="0.28"/>
  </linearGradient>
  <linearGradient id="groundFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="vig" cx="50%" cy="42%" r="78%">
    <stop offset="40%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.94"/>
  </radialGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="252" rx="234" ry="220" fill="url(#ivoryAura)"/>

<!-- palace hall — deeply receding arches -->
<path d="M 72 560 Q 72 70 200 46 Q 328 70 328 560" fill="none" stroke="#c8a848" stroke-width="1.2" opacity="0.16"/>
<path d="M 98 560 Q 98 104 200 86 Q 302 104 302 560" fill="none" stroke="#c8a848" stroke-width="0.7" opacity="0.10"/>
<path d="M 122 560 Q 122 134 200 122 Q 278 134 278 560" fill="none" stroke="#c8a848" stroke-width="0.4" opacity="0.07"/>
<path d="M 144 560 Q 144 160 200 152 Q 256 160 256 560" fill="none" stroke="#c8a848" stroke-width="0.3" opacity="0.05"/>
<!-- coffered ceiling -->
