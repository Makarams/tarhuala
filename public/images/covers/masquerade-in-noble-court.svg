  <path d="M 104 234 Q 124 224 144 232"/>
  <path d="M 296 234 Q 276 224 256 232"/>
</g>

<!-- ── FEATHER PLUMES — sweeping over each temple ── -->
<!-- Left plume cluster: three feathers cascading up-and-back -->
<g transform="translate(80 188)" opacity="0.86">
  <!-- back feather, longest -->
  <g transform="rotate(-32)">
    <path d="M 0 0 Q -3 -34 -1 -78 Q 0 -92 3 -88 Q 6 -76 5 -42 Q 4 -16 2 0 Z"
      fill="url(#maskFace)" opacity="0.78"/>
    <path d="M 0 0 Q -3 -34 -1 -78 Q 0 -92 3 -88 Q 6 -76 5 -42 Q 4 -16 2 0 Z"
      fill="none" stroke="#c8a848" stroke-width="0.5" opacity="0.7"/>
    <!-- barbs -->
    <g stroke="#c8a848" stroke-width="0.4" stroke-linecap="round" opacity="0.6" fill="none">
      <path d="M 1 -16 Q -5 -22 -8 -18"/>   <path d="M 2 -16 Q 7 -22 10 -18"/>
      <path d="M 1 -36 Q -6 -42 -9 -38"/>   <path d="M 2 -36 Q 8 -42 11 -38"/>
      <path d="M 1 -56 Q -6 -62 -9 -58"/>   <path d="M 2 -56 Q 8 -62 11 -58"/>
    </g>
    <line x1="0" y1="-2" x2="2" y2="-86" stroke="#a88828" stroke-width="0.5" opacity="0.7"/>
  </g>
  <!-- mid feather -->
  <g transform="rotate(-18)">
    <path d="M 0 0 Q -2 -28 -1 -62 Q 0 -72 2 -68 Q 4 -56 4 -34 Q 3 -14 1 0 Z"
      fill="#e8d49a" opacity="0.6"/>
    <path d="M 0 0 Q -2 -28 -1 -62 Q 0 -72 2 -68 Q 4 -56 4 -34 Q 3 -14 1 0 Z"
      fill="none" stroke="#c8a848" stroke-width="0.4" opacity="0.6"/>
    <line x1="0" y1="-2" x2="1" y2="-66" stroke="#a88828" stroke-width="0.4" opacity="0.6"/>
  </g>
  <!-- forward feather, shortest -->
  <g transform="rotate(-2)">
    <path d="M 0 0 Q -1.5 -22 -0.6 -48 Q 0 -56 1.5 -54 Q 3 -42 3 -26 Q 2.4 -10 0.8 0 Z"
      fill="#f8f0dc" opacity="0.46"/>
    <path d="M 0 0 Q -1.5 -22 -0.6 -48 Q 0 -56 1.5 -54 Q 3 -42 3 -26 Q 2.4 -10 0.8 0 Z"
      fill="none" stroke="#c8a848" stroke-width="0.35" opacity="0.55"/>
  </g>
</g>

<!-- Right plume cluster — mirror -->
<g transform="translate(320 188) scale(-1 1)" opacity="0.86">
  <g transform="rotate(-32)">
    <path d="M 0 0 Q -3 -34 -1 -78 Q 0 -92 3 -88 Q 6 -76 5 -42 Q 4 -16 2 0 Z"
      fill="url(#maskFace)" opacity="0.78"/>
    <path d="M 0 0 Q -3 -34 -1 -78 Q 0 -92 3 -88 Q 6 -76 5 -42 Q 4 -16 2 0 Z"
      fill="none" stroke="#c8a848" stroke-width="0.5" opacity="0.7"/>
    <g stroke="#c8a848" stroke-width="0.4" stroke-linecap="round" opacity="0.6" fill="none">
      <path d="M 1 -16 Q -5 -22 -8 -18"/>   <path d="M 2 -16 Q 7 -22 10 -18"/>
      <path d="M 1 -36 Q -6 -42 -9 -38"/>   <path d="M 2 -36 Q 8 -42 11 -38"/>
      <path d="M 1 -56 Q -6 -62 -9 -58"/>   <path d="M 2 -56 Q 8 -62 11 -58"/>
    </g>
    <line x1="0" y1="-2" x2="2" y2="-86" stroke="#a88828" stroke-width="0.5" opacity="0.7"/>
  </g>
  <g transform="rotate(-18)">
    <path d="M 0 0 Q -2 -28 -1 -62 Q 0 -72 2 -68 Q 4 -56 4 -34 Q 3 -14 1 0 Z"
      fill="#e8d49a" opacity="0.6"/>
    <line x1="0" y1="-2" x2="1" y2="-66" stroke="#a88828" stroke-width="0.4" opacity="0.6"/>
  </g>
  <g transform="rotate(-2)">
    <path d="M 0 0 Q -1.5 -22 -0.6 -48 Q 0 -56 1.5 -54 Q 3 -42 3 -26 Q 2.4 -10 0.8 0 Z"
      fill="#f8f0dc" opacity="0.46"/>
  </g>
</g>

