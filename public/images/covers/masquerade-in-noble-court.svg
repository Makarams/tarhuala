  fill="none" stroke="#dfc070" stroke-width="0.9" opacity="0.55"/>

<!-- eye apertures — kept as deep voids only, no visible eye, no lashes -->
<ellipse cx="156" cy="218" rx="22" ry="12" fill="#040302"/>
<ellipse cx="244" cy="218" rx="22" ry="12" fill="#040302"/>
<!-- gold trim around the apertures -->
<ellipse cx="156" cy="218" rx="22" ry="12" fill="none" stroke="#c8a848" stroke-width="1.6"/>
<ellipse cx="244" cy="218" rx="22" ry="12" fill="none" stroke="#c8a848" stroke-width="1.6"/>
<!-- inner secondary trim, slightly inset -->
<ellipse cx="156" cy="218" rx="18" ry="9" fill="none" stroke="#dfc070" stroke-width="0.6" opacity="0.55"/>
<ellipse cx="244" cy="218" rx="18" ry="9" fill="none" stroke="#dfc070" stroke-width="0.6" opacity="0.55"/>

<!-- centre brow filigree — refined scroll above the bridge -->
<g fill="none" stroke="#c8a848" stroke-width="1.0" opacity="0.68">
  <path d="M 178 186 Q 200 172 222 186"/>
  <path d="M 184 178 Q 200 168 216 178"/>
  <path d="M 192 170 Q 200 164 208 170"/>
</g>
<!-- centerpiece jewel and pearl drop -->
<g opacity="0.85">
  <circle cx="200" cy="166" r="3.6" fill="#c8a848"/>
  <circle cx="200" cy="166" r="2.0" fill="#f5e6b4"/>
  <circle cx="200" cy="165" r="0.7" fill="#ffffff" opacity="0.9"/>
  <line x1="200" y1="170" x2="200" y2="186" stroke="#c8a848" stroke-width="0.7" opacity="0.7"/>
  <circle cx="200" cy="190" r="2.2" fill="#f5e6b4" stroke="#c8a848" stroke-width="0.5"/>
</g>

<!-- side pearl rosettes near the temple wings -->
