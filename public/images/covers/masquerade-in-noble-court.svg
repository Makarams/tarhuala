  <path d="M 10 0 Q 36 90 20 200 Q 8 278 24 370"/>
  <path d="M 20 0 Q 48 90 32 200 Q 18 278 36 370"/>
  <path d="M 390 0 Q 364 90 380 200 Q 392 278 376 370"/>
  <path d="M 380 0 Q 352 90 368 200 Q 382 278 364 370"/>
</g>
<!-- tassel fringe -->
<g stroke="#c8a848" stroke-width="1.6" stroke-linecap="round" opacity="0.38">
  <line x1="22" y1="194" x2="17" y2="218"/>
  <line x1="30" y1="198" x2="25" y2="222"/>
  <line x1="38" y1="196" x2="33" y2="220"/>
  <line x1="47" y1="198" x2="42" y2="222"/>
  <line x1="378" y1="194" x2="383" y2="218"/>
  <line x1="370" y1="198" x2="375" y2="222"/>
  <line x1="362" y1="196" x2="367" y2="220"/>
  <line x1="353" y1="198" x2="358" y2="222"/>
</g>
<!-- tassel beads -->
<g fill="#c8a848" opacity="0.50">
  <circle cx="17" cy="220" r="2.5"/><circle cx="25" cy="224" r="2.5"/>
  <circle cx="33" cy="222" r="2.5"/><circle cx="42" cy="224" r="2.5"/>
  <circle cx="383" cy="220" r="2.5"/><circle cx="375" cy="224" r="2.5"/>
  <circle cx="367" cy="222" r="2.5"/><circle cx="358" cy="224" r="2.5"/>
</g>

<!-- ── MASQUERADE MASK — symmetric Venetian half-mask ── -->
<!-- soft halo behind mask -->
<g transform="translate(200 222)" filter="url(#maskhalo)">
  <ellipse rx="142" ry="74" fill="#c8a848" opacity="0.18"/>
</g>

<!-- mask depth shadow -->
<path d="M 70 200 Q 76 174 110 168 Q 154 162 186 176 Q 200 184 214 176 Q 246 162 290 168 Q 324 174 330 200 Q 326 230 296 248 Q 268 264 238 258 Q 220 254 210 268 Q 200 280 190 268 Q 180 254 162 258 Q 132 264 104 248 Q 74 230 70 200 Z"
  fill="#100806" opacity="0.62" transform="translate(4 6)"/>

<!-- mask main body — symmetric butterfly silhouette -->
<path d="M 70 200 Q 76 174 110 168 Q 154 162 186 176 Q 200 184 214 176 Q 246 162 290 168 Q 324 174 330 200 Q 326 230 296 248 Q 268 264 238 258 Q 220 254 210 268 Q 200 280 190 268 Q 180 254 162 258 Q 132 264 104 248 Q 74 230 70 200 Z"
  fill="url(#maskFace)"/>

<!-- porcelain top sheen — kept narrow so it reads as light, not a stripe -->
<path d="M 92 188 Q 130 170 178 178 Q 200 184 222 178 Q 270 170 308 188 Q 286 180 250 182 Q 224 184 200 188 Q 176 184 150 182 Q 114 180 92 188 Z"
  fill="#ffffff" opacity="0.14"/>

<!-- mask border — double gold trim -->
