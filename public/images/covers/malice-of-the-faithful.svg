<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
<defs>
  <filter id="g">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="7"/>
    <feColorMatrix values="0 0 0 0 0.02  0 0 0 0 0.05  0 0 0 0 0.03  0 0 0 0.5 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sporeglow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a1a0f"/>
    <stop offset="40%" stop-color="#050e08"/>
    <stop offset="100%" stop-color="#010402"/>
  </linearGradient>
  <radialGradient id="jadeAura" cx="50%" cy="45%" r="58%">
    <stop offset="0%" stop-color="#3ea77a" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#1a5c36" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="sporeCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8ffdc"/>
    <stop offset="20%" stop-color="#55c494"/>
    <stop offset="60%" stop-color="#1a7048"/>
    <stop offset="100%" stop-color="#0a2a18" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="marshFog" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f2e18" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
</defs>

<rect width="400" height="600" fill="url(#bg)"/>
<ellipse cx="200" cy="260" rx="230" ry="210" fill="url(#jadeAura)"/>

<!-- rain / decay vertical drips -->
<g stroke="#2a8a50" stroke-width="0.5" fill="none" opacity="0.18">
  <path d="M 30 0 Q 20 150 35 310 Q 50 460 25 600"/>
  <path d="M 78 0 Q 68 180 82 360 Q 96 510 72 600"/>
  <path d="M 145 0 Q 130 200 148 380 Q 165 545 140 600"/>
  <path d="M 225 0 Q 215 170 230 350 Q 244 505 218 600"/>
  <path d="M 300 0 Q 288 190 305 368 Q 320 518 295 600"/>
  <path d="M 362 0 Q 350 160 368 330 Q 382 480 355 600"/>
</g>

<!-- ── CENTRAL SPORE MANDALA ── -->
<g transform="translate(200 240)" filter="url(#sporeglow)">
  <circle r="135" fill="none" stroke="#3ea77a" stroke-width="0.8" opacity="0.12"/>
  <circle r="115" fill="none" stroke="#3ea77a" stroke-width="1"   opacity="0.18"/>
  <circle r="92"  fill="none" stroke="#55c494" stroke-width="0.8" opacity="0.22"/>
</g>
<g transform="translate(200 240)" filter="url(#glow)">
  <!-- mycelium spokes -->
  <g stroke="#3ea77a" stroke-width="1.2" fill="none" opacity="0.55">
    <line x1="0" y1="-108" x2="0" y2="-72"/>
    <line x1="0" y1="108"  x2="0" y2="72"/>
    <line x1="-108" y1="0" x2="-72" y2="0"/>
    <line x1="108"  y1="0" x2="72"  y2="0"/>
    <g transform="rotate(45)">
      <line x1="0" y1="-100" x2="0" y2="-68"/>
      <line x1="0" y1="100"  x2="0" y2="68"/>
      <line x1="-100" y1="0" x2="-68" y2="0"/>
      <line x1="100"  y1="0" x2="68"  y2="0"/>
    </g>
  </g>

  <!-- 8 kbach-style decay petals -->
  <g fill="#1a6040" fill-opacity="0.5" stroke="#3ea77a" stroke-width="0.9">
    <path d="M 0,-88 C -20,-70 -20,-40 0,-28 C 20,-40 20,-70 0,-88 Z"/>
    <path d="M 0,88  C -20,70  -20,40  0,28  C 20,40  20,70  0,88  Z"/>
    <path d="M -88,0 C -70,-20 -40,-20 -28,0 C -40,20 -70,20 -88,0 Z"/>
    <path d="M 88,0  C 70,-20  40,-20  28,0  C 40,20  70,20  88,0  Z"/>
  </g>
  <g fill="#155030" fill-opacity="0.35" stroke="#2a7a50" stroke-width="0.7" transform="rotate(45)">
    <path d="M 0,-82 C -14,-66 -14,-40 0,-32 C 14,-40 14,-66 0,-82 Z"/>
    <path d="M 0,82  C -14,66  -14,40  0,32  C 14,40  14,66  0,82  Z"/>
    <path d="M -82,0 C -66,-14 -40,-14 -32,0 C -40,14 -66,14 -82,0 Z"/>
    <path d="M 82,0  C 66,-14  40,-14  32,0  C 40,14  66,14  82,0  Z"/>
  </g>

  <!-- inner ring detail -->
  <circle r="52" fill="none" stroke="#55c494" stroke-width="1" opacity="0.4"/>
  <circle r="38" fill="none" stroke="#3ea77a" stroke-width="0.7" opacity="0.35"/>

  <!-- spore nodes on ring -->
  <g fill="#55c494" opacity="0.7">
    <circle cx="0"   cy="-52" r="2.5"/><circle cx="0"   cy="52"  r="2.5"/>
    <circle cx="-52" cy="0"   r="2.5"/><circle cx="52"  cy="0"   r="2.5"/>
    <circle cx="-37" cy="-37" r="2"/><circle cx="37" cy="-37" r="2"/>
    <circle cx="-37" cy="37"  r="2"/><circle cx="37" cy="37"  r="2"/>
  </g>

  <!-- dark core vessel -->
  <circle r="22" fill="#061208" stroke="#3ea77a" stroke-width="1.4"/>
  <circle r="14" fill="#3ea77a" opacity="0.85"/>
  <circle r="7"  fill="#c8ffdc"/>
  <circle r="2.5" fill="#ffffff" opacity="0.9"/>
</g>

<!-- ichor drip tendrils from spore -->
<g stroke="#2a8a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6">
  <path d="M 156 300 Q 140 332 148 368 Q 162 398 148 430"/>
  <path d="M 175 312 Q 165 348 172 388 Q 182 420 168 456"/>
  <path d="M 200 320 Q 196 360 202 400 Q 208 436 196 470"/>
  <path d="M 225 312 Q 235 348 228 388 Q 218 420 232 456"/>
  <path d="M 244 300 Q 260 332 252 368 Q 238 398 252 430"/>
</g>
<!-- drip terminus nodes -->
<g fill="#55c494" opacity="0.65">
  <circle cx="148" cy="368" r="3"/><circle cx="148" cy="430" r="2.2"/>
  <circle cx="172" cy="388" r="3"/><circle cx="168" cy="456" r="2.2"/>
  <circle cx="202" cy="400" r="3.2"/><circle cx="196" cy="470" r="2.5"/>
  <circle cx="228" cy="388" r="3"/><circle cx="232" cy="456" r="2.2"/>
  <circle cx="252" cy="368" r="3"/><circle cx="252" cy="430" r="2.2"/>
</g>

<!-- floating spores -->
<g fill="#55c494">
  <circle cx="45"  cy="165" r="1.4" opacity="0.6"/>
  <circle cx="90"  cy="130" r="0.9" opacity="0.5"/>
  <circle cx="155" cy="105" r="1.2" opacity="0.55"/>
  <circle cx="245" cy="103" r="1"   opacity="0.5"/>
  <circle cx="315" cy="128" r="1.3" opacity="0.55"/>
  <circle cx="360" cy="162" r="0.9" opacity="0.45"/>
  <circle cx="68"  cy="320" r="0.8" opacity="0.35"/>
  <circle cx="335" cy="315" r="0.8" opacity="0.35"/>
  <circle cx="175" cy="80"  r="0.7" opacity="0.5"/>
  <circle cx="228" cy="77"  r="1"   opacity="0.45"/>
  <circle cx="120" cy="380" r="0.7" opacity="0.4"/>
  <circle cx="285" cy="375" r="0.7" opacity="0.4"/>
</g>

<!-- marsh silhouette at bottom -->
<g fill="#010402" opacity="0.88">
  <rect x="0" y="490" width="400" height="110"/>
  <!-- reed / marsh grass -->
  <polygon points="0,490 0,458 6,442 12,458 18,438 24,455 30,448 36,468 42,455 48,472 54,462 60,478 70,490"/>
  <polygon points="70,490 70,470 76,455 82,465 88,448 94,460 100,452 106,462 112,445 118,458 124,452 130,490"/>
  <polygon points="130,490 134,468 138,455 144,465 150,448 156,462 162,452 168,490"/>
  <polygon points="232,490 238,468 242,452 248,462 254,448 260,462 266,455 272,490"/>
  <polygon points="270,490 276,452 282,462 288,448 294,460 300,452 308,465 316,456 322,490"/>
  <polygon points="320,490 328,472 334,462 340,478 346,462 352,455 358,468 364,452 370,468 375,458 382,445 388,460 395,450 400,462 400,490"/>
  <!-- water lily / lily pads -->
  <ellipse cx="100" cy="510" rx="22" ry="7" fill="#061208" opacity="0.9"/>
  <ellipse cx="200" cy="505" rx="28" ry="8" fill="#061208" opacity="0.9"/>
  <ellipse cx="310" cy="512" rx="20" ry="6" fill="#061208" opacity="0.9"/>
</g>
<rect x="0" y="455" width="400" height="145" fill="url(#marshFog)"/>

<!-- vignette -->
<radialGradient id="vig" cx="50%" cy="42%" r="78%">
  <stop offset="40%" stop-color="#000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0.9"/>
</radialGradient>
<rect width="400" height="600" fill="url(#vig)"/>

<!-- grain -->
<rect width="400" height="600" filter="url(#g)" opacity="0.5"/>

<!-- FRAME -->
<g stroke="#3ea77a" stroke-width="2" fill="none" stroke-linecap="round">
  <path d="M 14 50 L 14 14 L 50 14"/>
  <path d="M 350 14 L 386 14 L 386 50"/>
  <path d="M 14 550 L 14 586 L 50 586"/>
  <path d="M 386 550 L 386 586 L 350 586"/>
</g>
<g fill="#3ea77a" opacity="0.9">
  <circle cx="14" cy="14" r="3.5"/><circle cx="386" cy="14" r="3.5"/>
  <circle cx="14" cy="586" r="3.5"/><circle cx="386" cy="586" r="3.5"/>
</g>
<g stroke="#3ea77a" stroke-width="0.5" fill="none" opacity="0.3">
  <path d="M 22 56 L 22 22 L 56 22"/><path d="M 344 22 L 378 22 L 378 56"/>
  <path d="M 22 544 L 22 578 L 56 578"/><path d="M 378 544 L 378 578 L 344 578"/>
</g>
<rect x="10" y="10" width="380" height="580" fill="none" stroke="#3ea77a" stroke-width="0.5" opacity="0.25"/>

<!-- TITLE -->
<rect x="0" y="460" width="400" height="140" fill="#010402" opacity="0.92"/>
<line x1="30" y1="468" x2="370" y2="468" stroke="#3ea77a" stroke-width="0.8" opacity="0.5"/>
<g transform="translate(200 482)" fill="#3ea77a" opacity="0.6">
  <path d="M -34,0 Q -17,-6 0,0 Q 17,6 34,0" fill="none" stroke="#3ea77a" stroke-width="0.8"/>
  <circle cx="0" cy="0" r="2.5"/>
  <circle cx="-30" cy="0" r="1.2"/><circle cx="30" cy="0" r="1.2"/>
</g>
<text x="200" y="512" text-anchor="middle"
  font-family="Georgia,serif" font-size="22" font-weight="700" letter-spacing="2"
  fill="#d0f5e0" filter="url(#glow)">MALICE</text>
<text x="200" y="535" text-anchor="middle"
  font-family="Georgia,serif" font-size="10" font-weight="400" letter-spacing="5"
  fill="#3ea77a" opacity="0.9">OF THE FAITHFUL</text>
<text x="200" y="555" text-anchor="middle"
  font-family="Georgia,serif" font-size="8" font-weight="400" letter-spacing="4"
  fill="#786a5a" opacity="0.8">TARHUALA</text>
</svg>
