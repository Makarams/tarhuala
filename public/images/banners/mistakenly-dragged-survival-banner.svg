<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220">
<defs>
  <filter id="m-grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.68 0.72" numOctaves="4" seed="17"/>
    <feColorMatrix values="0 0 0 0 0.02  0 0 0 0 0.02  0 0 0 0 0.07  0 0 0 0.46 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="m-glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="m-softglow" x="-90%" y="-90%" width="280%" height="280%">
    <feGaussianBlur stdDeviation="28" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="m-hardglow" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="52" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- deep indigo void sky -->
  <linearGradient id="m-sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010108"/>
    <stop offset="42%" stop-color="#030512"/>
    <stop offset="100%" stop-color="#06081a"/>
  </linearGradient>
  <!-- central portal aura -->
  <radialGradient id="m-portal" cx="50%" cy="48%" r="36%">
    <stop offset="0%" stop-color="#6070d8" stop-opacity="0.62"/>
    <stop offset="38%" stop-color="#2a3898" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- left nebula, cooler blue -->
  <radialGradient id="m-neb1" cx="20%" cy="60%" r="30%">
    <stop offset="0%" stop-color="#1a2880" stop-opacity="0.44"/>
    <stop offset="55%" stop-color="#080c30" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- right nebula, violet shift -->
  <radialGradient id="m-neb2" cx="80%" cy="42%" r="28%">
    <stop offset="0%" stop-color="#3828a0" stop-opacity="0.38"/>
    <stop offset="58%" stop-color="#100830" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- void portal ring glow -->
  <radialGradient id="m-ring" cx="50%" cy="48%" r="50%">
    <stop offset="0%" stop-color="#8898ff" stop-opacity="0"/>
    <stop offset="74%" stop-color="#6070d8" stop-opacity="0.18"/>
    <stop offset="88%" stop-color="#9090ff" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#6060c0" stop-opacity="0"/>
  </radialGradient>
  <!-- horizon pulse indigo -->
  <linearGradient id="m-horizon" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4858c8" stop-opacity="0"/>
    <stop offset="78%" stop-color="#4858c8" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#6878e8" stop-opacity="0.20"/>
  </linearGradient>
  <!-- edge fades -->
  <linearGradient id="m-fade-l" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#010108" stop-opacity="1"/>
    <stop offset="12%" stop-color="#010108" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="m-fade-r" x1="0" y1="0" x2="1" y2="0">
    <stop offset="88%" stop-color="#010108" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010108" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="m-fade-top" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#010108" stop-opacity="1"/>
    <stop offset="18%" stop-color="#010108" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="m-fade-bot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="66%" stop-color="#010108" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010108" stop-opacity="1"/>
  </linearGradient>
  <clipPath id="m-clip"><rect width="1280" height="220"/></clipPath>
</defs>

<g clip-path="url(#m-clip)">
<!-- VOID SKY -->
<rect width="1280" height="220" fill="url(#m-sky)"/>

<!-- nebulae / atmospheric glow -->
<ellipse cx="640" cy="106" rx="580" ry="140" fill="url(#m-portal)"/>
<ellipse cx="256" cy="132" rx="360" ry="118" fill="url(#m-neb1)"/>
<ellipse cx="1024" cy="92" rx="320" ry="108" fill="url(#m-neb2)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#m-horizon)"/>

<!-- portal ring halo -->
<ellipse cx="640" cy="106" rx="370" ry="120" fill="url(#m-ring)"/>

<!-- ─── STAR FIELD ─── -->
<!-- distant tiny stars -->
<g fill="#c8d0ff" opacity="0.55">
  <circle cx="38" cy="18" r="0.7"/><circle cx="97" cy="42" r="0.6"/><circle cx="153" cy="12" r="0.8"/>
  <circle cx="204" cy="55" r="0.6"/><circle cx="261" cy="28" r="0.7"/><circle cx="319" cy="9" r="0.6"/>
  <circle cx="372" cy="48" r="0.7"/><circle cx="418" cy="22" r="0.8"/><circle cx="476" cy="60" r="0.6"/>
  <circle cx="523" cy="14" r="0.7"/><circle cx="581" cy="36" r="0.6"/><circle cx="636" cy="8" r="0.8"/>
  <circle cx="694" cy="44" r="0.6"/><circle cx="748" cy="19" r="0.7"/><circle cx="802" cy="52" r="0.6"/>
  <circle cx="856" cy="11" r="0.8"/><circle cx="914" cy="38" r="0.6"/><circle cx="967" cy="25" r="0.7"/>
  <circle cx="1024" cy="56" r="0.6"/><circle cx="1078" cy="16" r="0.8"/><circle cx="1136" cy="43" r="0.7"/>
  <circle cx="1192" cy="28" r="0.6"/><circle cx="1248" cy="61" r="0.7"/><circle cx="72" cy="74" r="0.6"/>
  <circle cx="128" cy="88" r="0.7"/><circle cx="185" cy="70" r="0.6"/><circle cx="240" cy="96" r="0.8"/>
  <circle cx="296" cy="78" r="0.6"/><circle cx="355" cy="102" r="0.7"/><circle cx="407" cy="84" r="0.6"/>
  <circle cx="462" cy="108" r="0.8"/><circle cx="540" cy="76" r="0.6"/><circle cx="608" cy="96" r="0.7"/>
  <circle cx="728" cy="72" r="0.6"/><circle cx="788" cy="100" r="0.7"/><circle cx="848" cy="80" r="0.6"/>
  <circle cx="908" cy="104" r="0.8"/><circle cx="968" cy="72" r="0.6"/><circle cx="1048" cy="88" r="0.7"/>
  <circle cx="1112" cy="76" r="0.6"/><circle cx="1170" cy="100" r="0.7"/><circle cx="1230" cy="84" r="0.6"/>
  <circle cx="58" cy="148" r="0.6"/><circle cx="118" cy="164" r="0.7"/><circle cx="178" cy="144" r="0.6"/>
  <circle cx="238" cy="178" r="0.8"/><circle cx="316" cy="155" r="0.6"/><circle cx="470" cy="162" r="0.6"/>
  <circle cx="556" cy="148" r="0.7"/><circle cx="688" cy="168" r="0.6"/><circle cx="806" cy="155" r="0.7"/>
  <circle cx="920" cy="170" r="0.6"/><circle cx="1060" cy="158" r="0.6"/><circle cx="1198" cy="166" r="0.7"/>
</g>

<!-- mid-brightness stars -->
<g fill="#d8e0ff" opacity="0.72">
  <circle cx="62" cy="32" r="1.0"/><circle cx="174" cy="67" r="0.9"/><circle cx="288" cy="44" r="1.1"/>
  <circle cx="402" cy="78" r="1.0"/><circle cx="514" cy="30" r="0.9"/><circle cx="626" cy="62" r="1.1"/>
  <circle cx="740" cy="36" r="1.0"/><circle cx="854" cy="68" r="0.9"/><circle cx="968" cy="48" r="1.1"/>
  <circle cx="1082" cy="72" r="1.0"/><circle cx="1196" cy="40" r="0.9"/>
  <circle cx="110" cy="116" r="1.0"/><circle cx="338" cy="126" r="1.1"/><circle cx="562" cy="118" r="0.9"/>
  <circle cx="788" cy="124" r="1.0"/><circle cx="1016" cy="114" r="1.1"/><circle cx="1240" cy="122" r="0.9"/>
</g>

<!-- brighter accent stars with glow -->
<g filter="url(#m-glow)">
  <circle cx="148" cy="24" r="1.5" fill="#b0b8ff" opacity="0.90"/>
  <circle cx="356" cy="58" r="1.6" fill="#a8b4ff" opacity="0.88"/>
  <circle cx="568" cy="26" r="1.4" fill="#c0c8ff" opacity="0.86"/>
  <circle cx="780" cy="54" r="1.6" fill="#a8b4ff" opacity="0.90"/>
  <circle cx="992" cy="30" r="1.5" fill="#b8c0ff" opacity="0.88"/>
  <circle cx="1204" cy="56" r="1.4" fill="#c0c8ff" opacity="0.86"/>
  <circle cx="252" cy="104" r="1.5" fill="#9898e8" opacity="0.82"/>
  <circle cx="696" cy="108" r="1.6" fill="#a0a8f0" opacity="0.84"/>
  <circle cx="1140" cy="100" r="1.5" fill="#9898e8" opacity="0.82"/>
</g>

<!-- ─── PORTAL RING ─── -->
<!-- outer faint ring -->
<ellipse cx="640" cy="110" rx="248" ry="78" fill="none" stroke="#4858c8" stroke-width="1.2" stroke-opacity="0.22"/>
<!-- main portal ring -->
<ellipse cx="640" cy="110" rx="196" ry="62" fill="none" stroke="#6878e8" stroke-width="1.8" stroke-opacity="0.40" filter="url(#m-softglow)"/>
<!-- inner bright ring -->
<ellipse cx="640" cy="110" rx="148" ry="46" fill="none" stroke="#9090ff" stroke-width="1.0" stroke-opacity="0.55" filter="url(#m-glow)"/>
<!-- portal core shimmer -->
<ellipse cx="640" cy="110" rx="72" ry="22" fill="#5060c8" fill-opacity="0.18" filter="url(#m-hardglow)"/>
<!-- portal inner dark void -->
<ellipse cx="640" cy="110" rx="96" ry="30" fill="#010108" fill-opacity="0.60"/>

<!-- ─── VOID TENDRILS ─── -->
<!-- left tendril -->
<path d="M440 110 Q520 98 560 112 Q590 118 600 110" fill="none" stroke="#7080e8" stroke-width="0.8" stroke-opacity="0.30"/>
<path d="M320 118 Q420 102 490 114" fill="none" stroke="#5060c8" stroke-width="0.6" stroke-opacity="0.22"/>
<!-- right tendril -->
<path d="M840 110 Q760 98 720 112 Q690 118 680 110" fill="none" stroke="#7080e8" stroke-width="0.8" stroke-opacity="0.30"/>
<path d="M960 118 Q860 102 790 114" fill="none" stroke="#5060c8" stroke-width="0.6" stroke-opacity="0.22"/>
<!-- top drift -->
<path d="M580 60 Q620 72 640 68 Q660 72 700 60" fill="none" stroke="#8888e8" stroke-width="0.6" stroke-opacity="0.25"/>
<!-- bottom drift -->
<path d="M580 158 Q620 148 640 152 Q660 148 700 158" fill="none" stroke="#6878d8" stroke-width="0.6" stroke-opacity="0.22"/>

<!-- ─── FLOATING DEBRIS / PARTICLES ─── -->
<g fill="#9898c8" filter="url(#m-glow)">
  <!-- left cluster -->
  <circle cx="180" cy="86" r="1.2" opacity="0.60"/>
  <circle cx="200" cy="94" r="0.9" opacity="0.45"/>
  <circle cx="220" cy="80" r="1.4" opacity="0.55"/>
  <circle cx="192" cy="108" r="0.8" opacity="0.40"/>
  <!-- right cluster -->
  <circle cx="1100" cy="82" r="1.2" opacity="0.60"/>
  <circle cx="1080" cy="98" r="0.9" opacity="0.45"/>
  <circle cx="1060" cy="76" r="1.4" opacity="0.55"/>
  <circle cx="1088" cy="112" r="0.8" opacity="0.40"/>
</g>
<!-- mid scattered -->
<g fill="#a0a8e8" opacity="0.35">
  <circle cx="380" cy="88" r="1.0"/><circle cx="490" cy="136" r="0.9"/><circle cx="540" cy="80" r="1.1"/>
  <circle cx="740" cy="82" r="1.0"/><circle cx="788" cy="140" r="0.9"/><circle cx="900" cy="86" r="1.1"/>
</g>

<!-- ─── EDGE & VIGNETTE FADES ─── -->
<rect x="0" y="0" width="1280" height="220" fill="url(#m-fade-l)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#m-fade-r)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#m-fade-top)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#m-fade-bot)"/>

<!-- FILM GRAIN -->
<rect width="1280" height="220" fill="url(#m-grain)" opacity="0.55"/>
</g>
</svg>
