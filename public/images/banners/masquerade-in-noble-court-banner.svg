<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220">
<defs>
  <filter id="i-grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.62 0.68" numOctaves="4" seed="22"/>
    <feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0 0.03  0 0 0 0.42 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="i-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="i-softglow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Ballroom void — warm dark, candlelit -->
  <linearGradient id="i-sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0604"/>
    <stop offset="50%" stop-color="#140e08"/>
    <stop offset="100%" stop-color="#0c0805"/>
  </linearGradient>
  <!-- Central candelabra glow — warm ivory -->
  <radialGradient id="i-core" cx="50%" cy="44%" r="38%">
    <stop offset="0%" stop-color="#d4c898" stop-opacity="0.32"/>
    <stop offset="40%" stop-color="#7a6030" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="i-neb-l" cx="20%" cy="55%" r="26%">
    <stop offset="0%" stop-color="#8a6c2c" stop-opacity="0.26"/>
    <stop offset="60%" stop-color="#1a1208" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="i-neb-r" cx="80%" cy="50%" r="26%">
    <stop offset="0%" stop-color="#8a6c2c" stop-opacity="0.24"/>
    <stop offset="60%" stop-color="#1a1208" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="i-floor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8dcb4" stop-opacity="0"/>
    <stop offset="80%" stop-color="#e8dcb4" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#e8dcb4" stop-opacity="0.18"/>
  </linearGradient>
  <linearGradient id="i-fade-l" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0a0604" stop-opacity="1"/>
    <stop offset="10%" stop-color="#0a0604" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="i-fade-r" x1="0" y1="0" x2="1" y2="0">
    <stop offset="90%" stop-color="#0a0604" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0604" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="i-fade-top" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0604" stop-opacity="1"/>
    <stop offset="14%" stop-color="#0a0604" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="i-fade-bot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="70%" stop-color="#0a0604" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0604" stop-opacity="1"/>
  </linearGradient>
  <clipPath id="i-clip"><rect width="1280" height="220"/></clipPath>
</defs>

<g clip-path="url(#i-clip)">
<rect width="1280" height="220" fill="url(#i-sky)"/>

<!-- Candlelit nebulae -->
<ellipse cx="640" cy="100" rx="600" ry="130" fill="url(#i-core)"/>
<ellipse cx="260" cy="120" rx="320" ry="100" fill="url(#i-neb-l)"/>
<ellipse cx="1020" cy="110" rx="320" ry="100" fill="url(#i-neb-r)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#i-floor)"/>

<!-- Pillared ballroom silhouette — soft archways -->
<g opacity="0.45" fill="#1a1208">
  <rect x="80" y="70" width="14" height="138"/>
  <rect x="220" y="78" width="12" height="130"/>
  <rect x="360" y="72" width="14" height="136"/>
  <rect x="500" y="74" width="13" height="134"/>
  <rect x="640" y="60" width="16" height="148"/>
  <rect x="780" y="74" width="13" height="134"/>
  <rect x="920" y="72" width="14" height="136"/>
  <rect x="1060" y="78" width="12" height="130"/>
  <rect x="1200" y="70" width="14" height="138"/>
</g>
<g opacity="0.32" fill="none" stroke="#5a4220" stroke-width="0.8">
  <path d="M 80 70 Q 165 36 240 70"/>
  <path d="M 220 78 Q 295 50 360 78"/>
  <path d="M 360 72 Q 435 40 510 72"/>
  <path d="M 500 74 Q 575 42 650 74"/>
  <path d="M 640 60 Q 715 30 790 60"/>
  <path d="M 780 74 Q 855 42 930 74"/>
  <path d="M 920 72 Q 995 40 1070 72"/>
  <path d="M 1060 78 Q 1135 50 1210 78"/>
</g>

<!-- Floating masquerade masks — symmetric Venetian half-masks -->
<!--
  Mask path is reused (id="i-mask") so all three masks share the same silhouette.
  Local coordinates: span from (-46,-12) top to (46,28) bottom; the dip at (0,18)
  is the nose cleft. Eye openings sit at (-22,2) and (22,2).
-->
<defs>
  <path id="i-mask"
    d="M -46 -2 Q -42 -18 -22 -18 Q -8 -18 -4 -10 Q 0 -4 4 -10 Q 8 -18 22 -18 Q 42 -18 46 -2 Q 42 18 22 22 Q 10 22 4 14 Q 0 18 -4 14 Q -10 22 -22 22 Q -42 18 -46 -2 Z"/>
</defs>

<!--
  Reusable feather-plume — cluster of three vanes that fan up-and-back from a
  temple anchor. Drawn in local coords starting at (0,0); rotate/translate per use.
-->
<defs>
  <g id="i-plume">
    <!-- back vane -->
    <g transform="rotate(-30)">
      <path d="M 0 0 Q -1.4 -22 -0.6 -50 Q 0 -60 1.4 -56 Q 2.8 -44 2.6 -26 Q 2 -10 0.8 0 Z"
        fill="#e8dcb4" opacity="0.42"/>
      <path d="M 0 0 Q -1.4 -22 -0.6 -50 Q 0 -60 1.4 -56 Q 2.8 -44 2.6 -26 Q 2 -10 0.8 0 Z"
        fill="none" stroke="#f0e2bc" stroke-width="0.35" opacity="0.7"/>
      <line x1="0" y1="-2" x2="1" y2="-54" stroke="#c4a870" stroke-width="0.3" opacity="0.7"/>
    </g>
    <!-- mid vane -->
    <g transform="rotate(-14)">
      <path d="M 0 0 Q -1.2 -18 -0.6 -42 Q 0 -50 1.2 -46 Q 2.4 -36 2.4 -22 Q 1.8 -8 0.8 0 Z"
        fill="#f0e2bc" opacity="0.36"/>
      <path d="M 0 0 Q -1.2 -18 -0.6 -42 Q 0 -50 1.2 -46 Q 2.4 -36 2.4 -22 Q 1.8 -8 0.8 0 Z"
        fill="none" stroke="#f0e2bc" stroke-width="0.3" opacity="0.6"/>
    </g>
    <!-- forward vane -->
    <g transform="rotate(2)">
      <path d="M 0 0 Q -0.9 -14 -0.4 -32 Q 0 -38 1.0 -36 Q 1.8 -28 1.8 -16 Q 1.4 -6 0.6 0 Z"
        fill="#f8efcc" opacity="0.32"/>
      <path d="M 0 0 Q -0.9 -14 -0.4 -32 Q 0 -38 1.0 -36 Q 1.8 -28 1.8 -16 Q 1.4 -6 0.6 0 Z"
        fill="none" stroke="#f0e2bc" stroke-width="0.25" opacity="0.55"/>
    </g>
  </g>
</defs>

<!-- Center hero mask — focal, ornate -->
<g transform="translate(640 96)" filter="url(#i-glow)" opacity="0.92">
  <!-- mirrored plume clusters at temples -->
  <g transform="translate(-40 -8)"><use href="#i-plume"/></g>
  <g transform="translate( 40 -8) scale(-1 1)"><use href="#i-plume"/></g>

  <!-- mask body -->
  <use href="#i-mask" fill="#e8dcb4" opacity="0.48"/>
  <use href="#i-mask" fill="none" stroke="#f0e2bc" stroke-width="0.9" opacity="0.95"/>
  <!-- inner trim line, parallel to the silhouette -->
  <path d="M -40 -2 Q -36 -14 -22 -14 Q -10 -14 -6 -8 Q 0 -2 6 -8 Q 10 -14 22 -14 Q 36 -14 40 -2 Q 36 14 22 18 Q 10 18 6 12 Q 0 14 -6 12 Q -10 18 -22 18 Q -36 14 -40 -2 Z"
    fill="none" stroke="#f0e2bc" stroke-width="0.4" opacity="0.55"/>

  <!-- eye apertures — closed, decorative voids only -->
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="none" stroke="#f0e2bc" stroke-width="0.5" opacity="0.7"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="none" stroke="#f0e2bc" stroke-width="0.5" opacity="0.7"/>

  <!-- centre brow scrollwork + jewel -->
  <path d="M -10 -10 Q 0 -16 10 -10" stroke="#f0e2bc" stroke-width="0.55" fill="none" opacity="0.78"/>
  <path d="M -6  -14 Q 0 -18  6 -14" stroke="#f0e2bc" stroke-width="0.4"  fill="none" opacity="0.6"/>
  <circle cx="0" cy="-12" r="1.4" fill="#f0e2bc" opacity="0.95"/>
  <circle cx="0" cy="-12" r="0.6" fill="#fff" opacity="0.9"/>
  <!-- pearl drop below the bridge -->
  <line x1="0" y1="-10" x2="0" y2="-2" stroke="#f0e2bc" stroke-width="0.3" opacity="0.6"/>
  <circle cx="0" cy="0" r="1" fill="#f0e2bc" opacity="0.85"/>

  <!-- mask surface flair — beaded forehead band, cheek filigree, cracquelure -->
  <g stroke="#f0e2bc" stroke-width="0.25" fill="none" opacity="0.5">
    <line x1="-34" y1="-7" x2="-12" y2="-7"/>
    <line x1=" 12" y1="-7" x2=" 34" y2="-7"/>
  </g>
  <g fill="#f0e2bc" opacity="0.82">
    <circle cx="-32" cy="-7" r="0.5"/><circle cx="-26" cy="-7" r="0.5"/>
    <circle cx="-20" cy="-7" r="0.5"/><circle cx="-14" cy="-7" r="0.5"/>
    <circle cx=" 14" cy="-7" r="0.5"/><circle cx=" 20" cy="-7" r="0.5"/>
    <circle cx=" 26" cy="-7" r="0.5"/><circle cx=" 32" cy="-7" r="0.5"/>
  </g>
  <g fill="none" stroke="#f0e2bc" stroke-width="0.32" opacity="0.62">
    <path d="M -36 8 Q -28 14 -18 14 Q -10 14 -8 10"/>
    <path d="M -28 16 Q -22 19 -14 18"/>
    <path d="M  36 8 Q  28 14  18 14 Q  10 14   8 10"/>
    <path d="M  28 16 Q  22 19  14 18"/>
  </g>
  <g fill="#f0e2bc" opacity="0.5">
    <path d="M -22 12 Q -19 15 -16 13 Q -19 11 -22 12 Z"/>
    <path d="M  22 12 Q  19 15  16 13 Q  19 11  22 12 Z"/>
  </g>
  <g stroke="#c4a870" stroke-width="0.18" fill="none" opacity="0.55">
    <path d="M -10 -4 L -6 6"/>
    <path d="M  10 -4 L  6 6"/>
    <path d="M -34 -2 L -30 6"/>
    <path d="M  34 -2 L  30 6"/>
  </g>
  <g fill="#f0e2bc" opacity="0.7">
    <circle cx="-3" cy="14" r="0.35"/>
    <circle cx=" 3" cy="14" r="0.35"/>
  </g>

  <!-- temple pearl rosettes -->
  <circle cx="-32" cy="-2" r="1.4" fill="#f5e6b4" stroke="#c8a848" stroke-width="0.3" opacity="0.85"/>
  <circle cx=" 32" cy="-2" r="1.4" fill="#f5e6b4" stroke="#c8a848" stroke-width="0.3" opacity="0.85"/>

  <!-- ribbon trailing both sides -->
  <path d="M -46 4 Q -68 14 -90 8" stroke="#e8dcb4" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M -46 8 Q -70 18 -94 12" stroke="#c4a870" stroke-width="0.4" fill="none" opacity="0.4"/>
  <path d="M  46 4 Q  68 14  90 8" stroke="#e8dcb4" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M  46 8 Q  70 18  94 12" stroke="#c4a870" stroke-width="0.4" fill="none" opacity="0.4"/>
</g>

<!-- Left companion mask -->
<g transform="translate(290 122) scale(0.7) rotate(-7)" filter="url(#i-glow)" opacity="0.74">
  <g transform="translate(-40 -8)"><use href="#i-plume" opacity="0.7"/></g>
  <g transform="translate( 40 -8) scale(-1 1)"><use href="#i-plume" opacity="0.7"/></g>
  <use href="#i-mask" fill="#8a6c2c" opacity="0.36"/>
  <use href="#i-mask" fill="none" stroke="#c4a870" stroke-width="0.8" opacity="0.78"/>
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="none" stroke="#c4a870" stroke-width="0.45" opacity="0.6"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="none" stroke="#c4a870" stroke-width="0.45" opacity="0.6"/>
  <circle cx="0" cy="-12" r="1.2" fill="#c4a870" opacity="0.85"/>
  <!-- companion mask flair — lighter beadwork + cheek scroll -->
  <g fill="#c4a870" opacity="0.7">
    <circle cx="-28" cy="-7" r="0.45"/><circle cx="-20" cy="-7" r="0.45"/>
    <circle cx="-12" cy="-7" r="0.45"/><circle cx=" 12" cy="-7" r="0.45"/>
    <circle cx=" 20" cy="-7" r="0.45"/><circle cx=" 28" cy="-7" r="0.45"/>
  </g>
  <g fill="none" stroke="#c4a870" stroke-width="0.3" opacity="0.6">
    <path d="M -32 10 Q -22 16 -12 14"/>
    <path d="M  32 10 Q  22 16  12 14"/>
  </g>
  <g stroke="#8a6c2c" stroke-width="0.2" fill="none" opacity="0.45">
    <path d="M -10 -2 L -6 6"/>
    <path d="M  10 -2 L  6 6"/>
  </g>
</g>

<!-- Right companion mask -->
<g transform="translate(990 122) scale(0.7) rotate(7)" filter="url(#i-glow)" opacity="0.74">
  <g transform="translate(-40 -8)"><use href="#i-plume" opacity="0.7"/></g>
  <g transform="translate( 40 -8) scale(-1 1)"><use href="#i-plume" opacity="0.7"/></g>
  <use href="#i-mask" fill="#8a6c2c" opacity="0.36"/>
  <use href="#i-mask" fill="none" stroke="#c4a870" stroke-width="0.8" opacity="0.78"/>
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="#0a0604"/>
  <ellipse cx="-22" cy="2" rx="8" ry="3.6" fill="none" stroke="#c4a870" stroke-width="0.45" opacity="0.6"/>
  <ellipse cx=" 22" cy="2" rx="8" ry="3.6" fill="none" stroke="#c4a870" stroke-width="0.45" opacity="0.6"/>
  <circle cx="0" cy="-12" r="1.2" fill="#c4a870" opacity="0.85"/>
  <!-- companion mask flair — lighter beadwork + cheek scroll -->
  <g fill="#c4a870" opacity="0.7">
    <circle cx="-28" cy="-7" r="0.45"/><circle cx="-20" cy="-7" r="0.45"/>
    <circle cx="-12" cy="-7" r="0.45"/><circle cx=" 12" cy="-7" r="0.45"/>
    <circle cx=" 20" cy="-7" r="0.45"/><circle cx=" 28" cy="-7" r="0.45"/>
  </g>
  <g fill="none" stroke="#c4a870" stroke-width="0.3" opacity="0.6">
    <path d="M -32 10 Q -22 16 -12 14"/>
    <path d="M  32 10 Q  22 16  12 14"/>
  </g>
  <g stroke="#8a6c2c" stroke-width="0.2" fill="none" opacity="0.45">
    <path d="M -10 -2 L -6 6"/>
    <path d="M  10 -2 L  6 6"/>
  </g>
</g>

<!-- Candle flame motes -->
<g filter="url(#i-softglow)">
  <circle cx="160" cy="70" r="2" fill="#f5e8c0" opacity="0.85"/>
  <circle cx="160" cy="70" r="6" fill="#e8c870" opacity="0.35"/>
  <circle cx="440" cy="62" r="1.6" fill="#f5e8c0" opacity="0.78"/>
  <circle cx="440" cy="62" r="5" fill="#e8c870" opacity="0.3"/>
  <circle cx="840" cy="62" r="1.6" fill="#f5e8c0" opacity="0.78"/>
  <circle cx="840" cy="62" r="5" fill="#e8c870" opacity="0.3"/>
  <circle cx="1120" cy="70" r="2" fill="#f5e8c0" opacity="0.85"/>
  <circle cx="1120" cy="70" r="6" fill="#e8c870" opacity="0.35"/>
</g>

<!-- Floating dust / glints -->
<g opacity="0.5">
  <circle cx="120" cy="44" r="0.8" fill="#e8dcb4"/>
  <circle cx="200" cy="58" r="0.6" fill="#d4c898"/>
  <circle cx="320" cy="36" r="0.7" fill="#e8dcb4"/>
  <circle cx="420" cy="50" r="0.5" fill="#d4c898"/>
  <circle cx="540" cy="42" r="0.7" fill="#e8dcb4"/>
  <circle cx="700" cy="38" r="0.6" fill="#d4c898"/>
  <circle cx="820" cy="48" r="0.7" fill="#e8dcb4"/>
  <circle cx="940" cy="36" r="0.5" fill="#d4c898"/>
  <circle cx="1060" cy="50" r="0.7" fill="#e8dcb4"/>
  <circle cx="1180" cy="44" r="0.6" fill="#d4c898"/>
</g>

<!-- Edge fades -->
<rect width="1280" height="220" fill="url(#i-fade-l)"/>
<rect width="1280" height="220" fill="url(#i-fade-r)"/>
<rect width="1280" height="220" fill="url(#i-fade-top)"/>
<rect width="1280" height="220" fill="url(#i-fade-bot)"/>

<rect width="1280" height="220" filter="url(#i-grain)" opacity="0.85"/>
</g>
</svg>
