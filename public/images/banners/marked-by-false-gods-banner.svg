<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220">
<defs>
  <filter id="j-grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.65 0.70" numOctaves="4" seed="31"/>
    <feColorMatrix values="0 0 0 0 0.01  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 0.48 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
  </filter>
  <filter id="j-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="j-softglow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="24" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="j-starglow" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- deep void sky -->
  <linearGradient id="j-sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000602"/>
    <stop offset="40%" stop-color="#010d05"/>
    <stop offset="100%" stop-color="#021408"/>
  </linearGradient>
  <!-- center jade cosmic glow -->
  <radialGradient id="j-core" cx="50%" cy="40%" r="40%">
    <stop offset="0%" stop-color="#1a7040" stop-opacity="0.55"/>
    <stop offset="40%" stop-color="#0d4022" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- left void nebula teal -->
  <radialGradient id="j-neb1" cx="22%" cy="55%" r="28%">
    <stop offset="0%" stop-color="#0a5030" stop-opacity="0.42"/>
    <stop offset="60%" stop-color="#042018" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- right nebula, cooler -->
  <radialGradient id="j-neb2" cx="78%" cy="45%" r="26%">
    <stop offset="0%" stop-color="#0e6038" stop-opacity="0.38"/>
    <stop offset="55%" stop-color="#041c10" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <!-- horizon shimmer -->
  <linearGradient id="j-horizon" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4aac6a" stop-opacity="0"/>
    <stop offset="80%" stop-color="#4aac6a" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#4aac6a" stop-opacity="0.22"/>
  </linearGradient>
  <!-- edge fades -->
  <linearGradient id="j-fade-l" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#000602" stop-opacity="1"/>
    <stop offset="10%" stop-color="#000602" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="j-fade-r" x1="0" y1="0" x2="1" y2="0">
    <stop offset="90%" stop-color="#000602" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000602" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="j-fade-top" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000602" stop-opacity="1"/>
    <stop offset="16%" stop-color="#000602" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="j-fade-bot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="68%" stop-color="#000602" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000602" stop-opacity="1"/>
  </linearGradient>
  <clipPath id="j-clip"><rect width="1280" height="220"/></clipPath>
</defs>

<g clip-path="url(#j-clip)">
<!-- VOID SKY -->
<rect width="1280" height="220" fill="url(#j-sky)"/>

<!-- nebulae / cosmic atmosphere -->
<ellipse cx="640" cy="88" rx="600" ry="130" fill="url(#j-core)"/>
<ellipse cx="280" cy="121" rx="340" ry="110" fill="url(#j-neb1)"/>
<ellipse cx="998" cy="99" rx="310" ry="100" fill="url(#j-neb2)"/>
<rect x="0" y="0" width="1280" height="220" fill="url(#j-horizon)"/>

<!-- ─── STAR FIELD ─── -->
<!-- tiny background stars -->
<g opacity="0.5">
  <circle cx="42" cy="18" r="0.7" fill="#c8ffe0"/>
  <circle cx="88" cy="34" r="0.5" fill="#a0f0c0"/>
  <circle cx="134" cy="12" r="0.8" fill="#e0fff0"/>
  <circle cx="198" cy="26" r="0.6" fill="#b0f8d0"/>
  <circle cx="245" cy="8" r="0.7" fill="#d0ffe8"/>
  <circle cx="302" cy="40" r="0.5" fill="#c0f0d8"/>
  <circle cx="356" cy="20" r="0.8" fill="#e8fff4"/>
  <circle cx="412" cy="14" r="0.6" fill="#a8f2c8"/>
  <circle cx="468" cy="36" r="0.5" fill="#d8ffe8"/>
  <circle cx="522" cy="10" r="0.7" fill="#b8f4d0"/>
  <circle cx="580" cy="28" r="0.6" fill="#c8fce0"/>
  <circle cx="636" cy="16" r="0.8" fill="#e0ffe8"/>
  <circle cx="692" cy="38" r="0.5" fill="#a0f0c0"/>
  <circle cx="748" cy="12" r="0.7" fill="#d0ffe0"/>
  <circle cx="804" cy="32" r="0.6" fill="#b8f8d8"/>
  <circle cx="860" cy="20" r="0.8" fill="#e8fff0"/>
  <circle cx="916" cy="44" r="0.5" fill="#c0f4d8"/>
  <circle cx="972" cy="8" r="0.7" fill="#d8ffe4"/>
  <circle cx="1028" cy="30" r="0.6" fill="#b0f0c8"/>
  <circle cx="1084" cy="18" r="0.8" fill="#e0f8e8"/>
  <circle cx="1140" cy="36" r="0.5" fill="#c8ffe0"/>
  <circle cx="1196" cy="14" r="0.7" fill="#a8f4c4"/>
  <circle cx="1252" cy="42" r="0.6" fill="#d8fff0"/>
  <!-- second layer -->
  <circle cx="65" cy="55" r="0.5" fill="#b0f0cc"/>
  <circle cx="118" cy="68" r="0.6" fill="#c8f8d8"/>
  <circle cx="170" cy="48" r="0.7" fill="#e0ffe8"/>
  <circle cx="222" cy="72" r="0.5" fill="#a8f2c0"/>
  <circle cx="274" cy="58" r="0.6" fill="#d0fce0"/>
  <circle cx="328" cy="78" r="0.5" fill="#b8f4cc"/>
  <circle cx="382" cy="62" r="0.7" fill="#e8fff2"/>
  <circle cx="436" cy="84" r="0.5" fill="#a0eec0"/>
  <circle cx="490" cy="70" r="0.6" fill="#c8fad8"/>
  <circle cx="544" cy="52" r="0.7" fill="#d8ffe4"/>
  <circle cx="598" cy="80" r="0.5" fill="#b0f2cc"/>
  <circle cx="720" cy="60" r="0.6" fill="#c0f4d4"/>
  <circle cx="776" cy="82" r="0.5" fill="#d0ffe0"/>
  <circle cx="832" cy="54" r="0.7" fill="#e0f8e8"/>
  <circle cx="888" cy="76" r="0.5" fill="#b8f0cc"/>
  <circle cx="944" cy="64" r="0.6" fill="#c8fcd8"/>
  <circle cx="1000" cy="86" r="0.5" fill="#a8eec0"/>
  <circle cx="1056" cy="58" r="0.7" fill="#d8ffe8"/>
  <circle cx="1112" cy="80" r="0.5" fill="#c0f2d0"/>
  <circle cx="1168" cy="66" r="0.6" fill="#e0fff2"/>
  <circle cx="1224" cy="88" r="0.5" fill="#b0f0c8"/>
</g>

<!-- brighter foreground stars with glow -->
<g filter="url(#j-starglow)">
  <circle cx="96" cy="44" r="1.4" fill="#80ffc0" opacity="0.85"/>
  <circle cx="320" cy="30" r="1.2" fill="#60e8a8" opacity="0.8"/>
  <circle cx="588" cy="56" r="1.6" fill="#88ffcc" opacity="0.9"/>
  <circle cx="840" cy="28" r="1.3" fill="#70f0b0" opacity="0.82"/>
  <circle cx="1060" cy="50" r="1.5" fill="#80ffc8" opacity="0.88"/>
  <circle cx="1200" cy="36" r="1.1" fill="#60e0a0" opacity="0.75"/>
  <!-- "selected" bright star — story pivot -->
  <circle cx="640" cy="38" r="3" fill="#aaffcc" opacity="0.95"/>
  <circle cx="640" cy="38" r="5" fill="#4aac6a" opacity="0.5"/>
  <circle cx="640" cy="38" r="9" fill="#4aac6a" opacity="0.18"/>
</g>

<!-- ─── CONSTELLATION GEOMETRY ─── -->
<!-- Main constellation — 12-point structure for the 12 false gods -->
<g opacity="0.55" stroke="#4aac6a" stroke-width="0.8" fill="none">
  <!-- outer ring connections -->
  <polygon points="640,38 550,88 558,178 640,202 722,178 730,88" opacity="0.35"/>
  <!-- inner star -->
  <polygon points="640,38 680,120 594,72" opacity="0.28"/>
  <polygon points="640,38 600,120 686,72" opacity="0.28"/>
  <!-- cross lines -->
  <line x1="550" y1="88" x2="730" y2="88" opacity="0.22"/>
  <line x1="558" y1="178" x2="722" y2="178" opacity="0.22"/>
  <line x1="550" y1="88" x2="722" y2="178" opacity="0.18"/>
  <line x1="730" y1="88" x2="558" y2="178" opacity="0.18"/>
</g>
<!-- constellation node stars -->
<g filter="url(#j-starglow)" opacity="0.75">
  <circle cx="550" cy="88" r="1.8" fill="#4aac6a"/>
  <circle cx="730" cy="88" r="1.8" fill="#4aac6a"/>
  <circle cx="558" cy="178" r="1.6" fill="#4aac6a"/>
  <circle cx="722" cy="178" r="1.6" fill="#4aac6a"/>
  <circle cx="640" cy="202" r="2" fill="#4aac6a"/>
  <circle cx="594" cy="72" r="1.4" fill="#66c882"/>
  <circle cx="686" cy="72" r="1.4" fill="#66c882"/>
  <circle cx="600" cy="120" r="1.4" fill="#66c882"/>
  <circle cx="680" cy="120" r="1.4" fill="#66c882"/>
</g>

<!-- secondary small constellation LEFT -->
<g opacity="0.38" stroke="#2a8848" stroke-width="0.7" fill="none">
  <polygon points="210,52 240,82 200,98 170,72" />
  <line x1="210" y1="52" x2="200" y2="98"/>
</g>
<g filter="url(#j-starglow)" opacity="0.6">
  <circle cx="210" cy="52" r="1.5" fill="#4aac6a"/>
  <circle cx="240" cy="82" r="1.2" fill="#2a8848"/>
  <circle cx="200" cy="98" r="1.3" fill="#4aac6a"/>
  <circle cx="170" cy="72" r="1.1" fill="#2a8848"/>
</g>

<!-- secondary small constellation RIGHT -->
<g opacity="0.38" stroke="#2a8848" stroke-width="0.7" fill="none">
  <polygon points="1070,44 1100,70 1072,94 1040,68"/>
  <line x1="1070" y1="44" x2="1072" y2="94"/>
</g>
<g filter="url(#j-starglow)" opacity="0.6">
  <circle cx="1070" cy="44" r="1.5" fill="#4aac6a"/>
  <circle cx="1100" cy="70" r="1.2" fill="#2a8848"/>
  <circle cx="1072" cy="94" r="1.3" fill="#4aac6a"/>
  <circle cx="1040" cy="68" r="1.1" fill="#2a8848"/>
</g>

<!-- ─── DISTANT VOID ALTAR / STRUCTURE ─── -->
<!-- The "place where nothing has ever existed" — geometric void platform -->
<g opacity="0.7">
  <!-- horizon platform line -->
  <rect x="300" y="188" width="680" height="2" fill="#1a6030" opacity="0.4"/>
  <!-- central pillar structure, ethereal -->
  <rect x="624" y="148" width="32" height="44" fill="#0a2a14" opacity="0.8"/>
  <polygon points="608,148 672,148 656,130 640,124 624,130" fill="#0c3018" opacity="0.9"/>
  <!-- pillar glow at base -->
  <ellipse cx="640" cy="190" rx="40" ry="8" fill="#4aac6a" opacity="0.18" filter="url(#j-softglow)"/>
  <!-- runes/marks on pillar — small dots -->
  <circle cx="632" cy="160" r="1.5" fill="#4aac6a" opacity="0.6" filter="url(#j-glow)"/>
  <circle cx="640" cy="155" r="1.5" fill="#66c882" opacity="0.7" filter="url(#j-glow)"/>
  <circle cx="648" cy="160" r="1.5" fill="#4aac6a" opacity="0.6" filter="url(#j-glow)"/>
  <circle cx="636" cy="168" r="1" fill="#4aac6a" opacity="0.5"/>
  <circle cx="644" cy="168" r="1" fill="#4aac6a" opacity="0.5"/>
  <!-- flanking smaller pillars -->
  <rect x="575" y="168" width="16" height="24" fill="#0a2814" opacity="0.6"/>
  <polygon points="570,168 596,168 590,158 583,154 576,158" fill="#0c2c16" opacity="0.7"/>
  <rect x="689" y="168" width="16" height="24" fill="#0a2814" opacity="0.6"/>
  <polygon points="684,168 710,168 704,158 697,154 690,158" fill="#0c2c16" opacity="0.7"/>
  <!-- far flanking pillars -->
  <rect x="480" y="178" width="10" height="14" fill="#081e10" opacity="0.5"/>
  <rect x="790" y="178" width="10" height="14" fill="#081e10" opacity="0.5"/>
</g>

<!-- ─── LIGHT BALL — the constellation manager's call ─── -->
<g filter="url(#j-softglow)">
  <circle cx="640" cy="38" r="18" fill="#4aac6a" opacity="0.14"/>
  <circle cx="640" cy="38" r="11" fill="#66c882" opacity="0.22"/>
  <circle cx="640" cy="38" r="6" fill="#88ffcc" opacity="0.55"/>
  <circle cx="640" cy="38" r="3" fill="#ccffe8" opacity="0.9"/>
</g>

<!-- ─── EDGE FADES ─── -->
<rect width="1280" height="220" fill="url(#j-fade-l)"/>
<rect width="1280" height="220" fill="url(#j-fade-r)"/>
<rect width="1280" height="220" fill="url(#j-fade-top)"/>
<rect width="1280" height="220" fill="url(#j-fade-bot)"/>

<!-- GRAIN -->
<rect width="1280" height="220" filter="url(#j-grain)" opacity="0.9"/>
</g>
</svg>
