      }
      .ch-title-text{
        font-size:14.5px !important;
        line-height:1.45;
        overflow-wrap:anywhere;
      }
    }

  <script>
    (function(){
      // This script only adds client-side search filtering on top of app.js rendering.
      // app.js still controls fetching/rendering/sort logic.
      var input = document.getElementById('chapters-search-input');
      var list = document.getElementById('chapters-full-list');
      var empty = document.getElementById('chapters-empty');
      var visibleCount = document.getElementById('visible-count');

      if (!input || !list) return;

      function filterList(){
        var q = (input.value || '').trim().toLowerCase();
        var items = Array.prototype.slice.call(list.querySelectorAll('li.ch-item'));
        var shown = 0;

        items.forEach(function(li){
          var txt = (li.textContent || '').toLowerCase();
          var ok = !q || txt.indexOf(q) !== -1;
          li.style.display = ok ? '' : 'none';
          if (ok) shown++;
        });

        if (visibleCount) visibleCount.textContent = shown;
        if (empty) empty.classList.toggle('show', shown === 0);
      }

      input.addEventListener('input', filterList);

      // Re-apply filter after app.js re-renders sort/order
      var mo = new MutationObserver(function(){ filterList(); });
      mo.observe(list, { childList:true, subtree:false });
    })();
  </script>
